    <div class="dashboard-card facts-card">
      <div class="facts-header">
        <div class="facts-title">
          <span class="facts-icon" aria-hidden="true">💡</span>
          <h3>Did You Know?</h3>
        </div>
        <button type="button" onclick="showNextFact()" class="facts-btn">
          Next Fact →
        </button>
      </div>
      <div class="facts-content">
        <p id="factText" class="fact-text" aria-live="polite" aria-atomic="true">
          Loading fact...
        </p>
        <div class="facts-footer">
          <span class="facts-date" id="factDate">📅 Fact of the day</span>
          <span class="facts-counter" id="factCounter">1/15</span>
        </div>
      </div>
    </div>
