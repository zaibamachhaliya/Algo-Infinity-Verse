    <!-- Rust Playground Section -->
    <section id="rust-playground" class="section rust-playground-section">
      <div class="container">
        <div class="rust-hero">
          <h2 class="section-title">
            <span class="title-icon">🦀</span>
            Rust Code Playground
          </h2>
          <p class="section-subtitle">
            Write, compile, and run Rust programs directly in the browser using
            a sandboxed execution API.
          </p>
        </div>

        <div class="rust-playground">
          <div class="rust-editor-panel">
            <div class="panel-header">
              <h2>Editor</h2>
              <label for="rustExampleSelect" class="visually-hidden"
                >Choose a Rust example</label
              >
              <select id="rustExampleSelect">
                <option value="hello">Hello World</option>
                <option value="ownership">Ownership & Borrowing</option>
                <option value="structs">Structs & Enums</option>
                <option value="concurrency">Basic Concurrency</option>
              </select>
            </div>

            <label for="rustEditor" class="visually-hidden"
              >Rust code editor</label
            >
            <textarea id="rustEditor" spellcheck="false"></textarea>

            <div class="rust-actions">
              <button type="button" id="runRustBtn">Run Code</button>
              <button type="button" id="resetRustBtn">Reset</button>
              <button type="button" id="clearRustOutputBtn">Clear Output</button>
            </div>
          </div>

          <div class="rust-output-panel">
            <h2>Output Console</h2>
            <pre id="rustOutput">Output will appear here...</pre>
          </div>
        </div>
      </div>
    </section>
