    <div class="modal" id="changePasswordModal">
      <div class="modal-content">
        <div class="modal-header">
          <h3>Change Password</h3>
          <button type="button"
            class="modal-close"
            id="changePasswordClose"
            aria-label="Close"
          >
            &times;
          </button>
        </div>
        <div class="modal-body">
          <div class="profile-edit-form">
            <div
              id="changePasswordMessage"
              class="password-message"
              role="alert"
            ></div>


            <!-- Current Password -->

            <div class="password-field">
              <label for="currentPassword">Current Password</label>
              <div class="password-input-wrapper">
                <input
                  type="password"
                  id="currentPassword"
                  placeholder="Enter current password"
                />
                <button
                  type="button"
                  class="password-toggle"
                  data-target="currentPassword"
                >
                  <i class="fas fa-eye"></i>
                </button>
              </div>
            </div>


            <!-- New Password -->

            <div class="password-field">
              <label for="newPassword">New Password</label>
              <div class="password-input-wrapper">
                <input
                  type="password"
                  id="newPassword"
                  placeholder="Create a strong password"
                />
                <button
                  type="button"
                  class="password-toggle"
                  data-target="newPassword"
                >
                  <i class="fas fa-eye"></i>
                </button>
              </div>
              <div class="password-strength">
                <div
                  id="passwordStrengthBar"
                  class="strength-bar"
                ></div>
              </div>
              <span
                id="passwordStrengthText"
                class="strength-text"
              >
                Password strength
              </span>
              <ul class="password-rules">
                <li id="ruleLength">Minimum 8 characters</li>
                <li id="ruleUpper">One uppercase letter</li>
                <li id="ruleLower">One lowercase letter</li>
                <li id="ruleNumber">One number</li>
                <li id="ruleSpecial">One special character</li>
              </ul>
            </div>


            <!-- Confirm Password -->

            <div class="password-field">
              <label for="confirmNewPassword">
                Confirm New Password
              </label>
              <div class="password-input-wrapper">
                <input
                  type="password"
                  id="confirmNewPassword"
                  placeholder="Confirm new password"
                />
                <button
                  type="button"
                  class="password-toggle"
                  data-target="confirmNewPassword"
                >
                  <i class="fas fa-eye"></i>
                </button>
              </div>
              <small
                id="confirmPasswordError"
                class="field-error"
              ></small>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button"
            class="btn btn-secondary"
            id="cancelPasswordChange"
          >
            Cancel
          </button>
          <button type="button"
            class="btn btn-primary"
            id="savePasswordBtn"
          >
            Change Password
          </button>
        </div>
      </div>
    </div>
