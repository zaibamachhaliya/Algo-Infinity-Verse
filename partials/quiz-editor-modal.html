    <!-- Quiz Editor Modal -->
    <div class="modal quiz-modal" id="quizEditorModal">
      <div class="quiz-modal-content">
        <div id="quizLoadingScreen" class="quiz-loading hidden">
          <div class="quiz-spinner"></div>
          <h3 class="loading-text">Vectoring Challenge...</h3>
          <p id="loadingTopicName"></p>
        </div>
        <div class="quiz-modal-header">
          <div class="quiz-problem-info">
            <span class="quiz-topic-badge" id="quizTopicBadge"></span>
            <span class="quiz-difficulty" id="quizDifficulty"></span>
            <h3 id="quizTitle">Problem Title</h3>
            <button type="button" class="quiz-modal-close" id="quizModalClose" aria-label="Close">&times;</button>
          </div>
        </div>
        <div class="quiz-modal-body">
          <div class="quiz-layout">
            <div class="quiz-problem-panel">
              <div class="quiz-panel-tabs" style="display: flex; border-bottom: 1px solid var(--glass-border); margin-bottom: 1rem; gap: 0.5rem;">
                <button id="btnQuizTabProblem" class="quiz-tab-btn active" onclick="switchQuizTab('problem')" type="button">Description</button>
                <button id="btnQuizTabNotes" class="quiz-tab-btn" onclick="switchQuizTab('notes')" type="button">Notes & Mnemonics</button>
              </div>

              <div id="quizTabProblemContent">
                <div class="problem-description">
                  <h4>Problem Description</h4>
                  <p id="quizDescription"></p>
                  <div class="problem-examples">
                    <h5>Examples</h5>
                    <div id="quizExamples"></div>
                  </div>
                </div>
                <div class="test-cases-section">
                  <h5 class="test-cases-heading">Test Cases</h5>
                  <div class="test-cases-container" id="quizTestCasesContainer"></div>
                </div>
              </div>

              <div id="quizTabNotesContent" style="display: none; padding-right: 0.5rem; max-height: 480px; overflow-y: auto;">
                <h4 style="margin-top:0; font-family:'Orbitron',sans-serif; color:var(--accent);">Problem Study Guide</h4>
                <p style="font-size:0.8rem; color:var(--text-secondary); margin-bottom: 1rem;">Attach study hooks, traps, and guidelines below. Notes are saved to your profile.</p>
                
                <div class="control-group" style="margin-bottom: 0.75rem;">
                  <label for="noteText" style="display:block; font-size:0.8rem; margin-bottom:0.25rem;">My Notes</label>
                  <textarea id="noteText" class="control-input" placeholder="General observations, explanations, or approach summaries..." style="height: 70px; resize: vertical; width: 100%; border-radius: 6px; padding: 0.5rem; background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); color: var(--text-primary); font-family: inherit; font-size: 0.9rem;"></textarea>
                </div>
                
                <div class="control-group" style="margin-bottom: 0.75rem;">
                  <label for="mnemonicText" style="display:block; font-size:0.8rem; margin-bottom:0.25rem;">Mnemonics / Memory Hooks</label>
                  <textarea id="mnemonicText" class="control-input" placeholder="e.g. 'FAST/SLOW pointers: Slow moves 1, Fast moves 2'..." style="height: 60px; resize: vertical; width: 100%; border-radius: 6px; padding: 0.5rem; background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); color: var(--text-primary); font-family: inherit; font-size: 0.9rem;"></textarea>
                </div>
                
                <div class="control-group" style="margin-bottom: 0.75rem;">
                  <label for="pitfallsText" style="display:block; font-size:0.8rem; margin-bottom:0.25rem;">Common Pitfalls & Traps</label>
                  <textarea id="pitfallsText" class="control-input" placeholder="What to watch out for (e.g. integer overflow, empty checks)..." style="height: 60px; resize: vertical; width: 100%; border-radius: 6px; padding: 0.5rem; background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); color: var(--text-primary); font-family: inherit; font-size: 0.9rem;"></textarea>
                </div>
                
                <div class="control-group" style="margin-bottom: 0.75rem;">
                  <label for="whenToUseText" style="display:block; font-size:0.8rem; margin-bottom:0.25rem;">When to use this Pattern?</label>
                  <textarea id="whenToUseText" class="control-input" placeholder="Characteristics of problems that need this solution pattern..." style="height: 60px; resize: vertical; width: 100%; border-radius: 6px; padding: 0.5rem; background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); color: var(--text-primary); font-family: inherit; font-size: 0.9rem;"></textarea>
                </div>

                <div class="control-group" style="margin-bottom: 1rem;">
                  <label for="noteTags" style="display:block; font-size:0.8rem; margin-bottom:0.25rem;">Tags (Comma-separated)</label>
                  <input type="text" id="noteTags" class="control-input" placeholder="e.g. sliding-window, hash-map" style="width: 100%; border-radius: 6px; padding: 0.5rem; background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); color: var(--text-primary); font-family: inherit; font-size: 0.9rem;">
                </div>
                
                <div style="display:flex; justify-content:space-between; align-items:center; margin-top: 1rem;">
                  <span id="noteSaveStatus" style="font-size:0.8rem; color:#10b981; font-style:italic;"></span>
                  <button id="btnSaveProblemNotes" class="btn btn-primary" onclick="saveActiveProblemNotes()" type="button" style="padding: 0.4rem 0.8rem; font-size: 0.82rem;"><i class="fas fa-save"></i> Save Notes</button>
                </div>
              </div>
            </div>
            <div class="quiz-editor-panel">
              <div class="code-editor-container">
                <div class="editor-header">
                  <div class="problem-details">
                    <select id="languageSelect" class="language-select">
                      <option value="javascript">JavaScript</option>
                      <option value="python">Python</option>
                      <option value="java">Java</option>
                      <option value="cpp">C++</option>
                      <option value="c">C</option>
                      <option value="swift">Swift</option>
                    </select>
                  </div>
                  <div class="editor-actions">
                    <button type="button"
                      class="editor-btn"
                      onclick="insertSnippet('function')"
                      title="Insert function"
                    >
                      <i class="fas fa-code"></i><span class="btn-text"> Function</span>
                    </button>
                    <button type="button"
                      class="editor-btn"
                      onclick="formatCode()"
                      title="Format code"
                    >
                      <i class="fas fa-indent"></i><span class="btn-text"> Format</span>
                    </button>
                    <button class="editor-btn" id="aiInterviewerToggle" type="button" onclick="toggleAiInterviewer()" title="Invite AI Interviewer" aria-pressed="false" style="color: #10b981; border: 1px solid #10b981;">
                      <i class="fas fa-user-tie"></i><span class="btn-text"> AI Interviewer</span>
                    </button>
                    <button type="button"
                      class="editor-btn"
                      onclick="toggleLineComment()"
                      title="Toggle comment"
                    >
                      <i class="fas fa-comment"></i><span class="btn-text"> //</span>
                    </button>
                  </div>
                </div>
                <div class="code-editor">
                  <div class="line-numbers" id="lineNumbers"></div>
                  <textarea
                    id="codeEditor"
                    class="code-textarea"
                    spellcheck="false"
                    placeholder="// Write your solution here...&#10;&#10;function twoSum(nums, target) {&#10;    // Your code here&#10;}"
                  ></textarea>
                  <div class="syntax-highlight" id="syntaxHighlight"></div>
                  <div class="current-line-indicator" id="currentLineIndicator"></div>
                </div>
                <div class="editor-shortcuts">
                  <span aria-label="Run Code shortcut: Control plus Enter"><kbd>Ctrl</kbd>+<kbd>Enter</kbd><span class="shortcut-label"> Run Code</span></span>
                  <span aria-label="Submit shortcut: Control plus S"><kbd>Ctrl</kbd>+<kbd>S</kbd><span class="shortcut-label"> Submit</span></span>
                </div>
                <div class="output-panel" id="outputPanel">
                  <button
                    type="button"
                    class="output-header"
                    id="outputHeader"
                    aria-controls="quizOutputContent"
                    aria-expanded="true"
                  >
                    <span>Output</span>
                    <i class="fas fa-chevron-down" id="outputToggleIcon"></i>
                  </button>

                </div>
                <div class="output-content" id="quizOutputContent">
                  <p class="output-placeholder">
                    Run your code to see output...
                  </p>

                  <div class="output-content" id="quizOutputContent-1">
                    <p class="output-placeholder">
                      Run your code to see output...
                    </p>
                  </div>

                </div>
              </div>
            </div>
          </div>
        </div>
        <div class="quiz-modal-footer">
          <div class="quiz-actions" style="display:flex; justify-content:flex-end; align-items:center; width:100%; gap: 1rem; flex-wrap: wrap;">
            <div style="display:flex; gap:0.5rem; margin-left: auto;">
              <button type="button" class="btn btn-outline" id="quizRunBtn">
                <i class="fas fa-play"></i> Run
              </button>
              <button type="button" class="btn btn-primary" id="quizSubmitBtn">
                <i class="fas fa-paper-plane"></i> Submit
              </button>
            </div>
            
            <div id="sm2RatingContainer" style="display:none; align-items:center; gap:0.6rem; background:rgba(255,255,255,0.03); padding:0.4rem 0.8rem; border-radius:8px; border:1px solid var(--glass-border);">
              <span style="font-size:0.8rem; color:var(--text-secondary); font-weight:600; font-family:'Orbitron',sans-serif;">SM-2 Schedule:</span>
              <button class="btn" style="background:rgba(239, 68, 68, 0.2); color:#ef4444; border:1px solid rgba(239,68,68,0.4); padding:0.25rem 0.5rem; font-size:0.75rem; font-family:'Orbitron',sans-serif; cursor:pointer;" onclick="rateRecallDifficulty(1)" type="button">Again</button>
              <button class="btn" style="background:rgba(245, 158, 11, 0.2); color:#f59e0b; border:1px solid rgba(245,158,11,0.4); padding:0.25rem 0.5rem; font-size:0.75rem; font-family:'Orbitron',sans-serif; cursor:pointer;" onclick="rateRecallDifficulty(3)" type="button">Good</button>
              <button class="btn" style="background:rgba(16, 185, 129, 0.2); color:#10b981; border:1px solid rgba(16,185,129,0.4); padding:0.25rem 0.5rem; font-size:0.75rem; font-family:'Orbitron',sans-serif; cursor:pointer;" onclick="rateRecallDifficulty(5)" type="button">Easy</button>
            </div>
          </div>
        </div>
      </div>
    </div>
