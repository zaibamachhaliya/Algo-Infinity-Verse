    <div
      class="modal"
      id="notesModal"
      role="dialog"
      aria-modal="true"
      aria-labelledby="notesModalTitle"
    >
      <div class="modal-content notes-modal-content">
        <div class="modal-header">
          <h3 id="notesModalTitle">Problem Notes</h3>
          <button type="button"
            class="modal-close"
            id="notesModalClose"
            aria-label="Close notes modal"
          >
            <i class="fas fa-times"></i>
          </button>
        </div>
        <div class="modal-body">
          <label for="problemNotesInput">Problem notes</label>
          <textarea
            id="problemNotesInput"
            class="notes-textarea"
            placeholder="Write your notes, hints, observations, or edge cases here..."
          ></textarea>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" id="closeNotesBtn">Close</button>
          <button type="button" class="btn btn-primary" id="saveNotesBtn">
            <i class="fas fa-save"></i> Save Notes
          </button>
        </div>
      </div>
    </div>
