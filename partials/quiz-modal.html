    <!-- Quiz Modal -->
    <div class="modal quiz-modal" id="quizModal">
      <div class="quiz-modal-content">
        <div class="quiz-modal-header">
          <div class="quiz-problem-info">
            <span class="quiz-topic-badge" id="topicQuizBadge">Arrays</span>
            <span class="quiz-difficulty" id="topicQuizDifficulty">Medium</span>
          </div>
          <h3 id="topicQuizTitle">Topic Quiz</h3>
          <button type="button"
            class="modal-close"
            id="topicQuizModalClose"
            aria-label="Close quiz modal"
          >
            <i class="fas fa-times"></i>
          </button>
        </div>
        <div class="quiz-modal-body">
          <div class="quiz-layout">
            <div class="quiz-problem-panel">
              <div class="quiz-container">
                <div class="quiz-progress-bar-container">
                  <div class="quiz-progress-bar" id="topicQuizProgress"></div>
                </div>
                <div class="quiz-counter" id="topicQuizCounter">1 / 10</div>
                <div class="quiz-question" id="topicQuizQuestionText">
                  Question will appear here
                </div>
                <div class="quiz-options" id="topicQuizOptions">
                </div>
              </div>
            </div>

            <div class="quiz-editor-panel">
              <div class="quiz-info-panel">
                <h4>Quiz Instructions</h4>
                <ul>
                  <li>Select the correct answer for each question</li>
                  <li>You earn 10 XP per correct answer</li>
                  <li>Your best score is saved</li>
                  <li>Retake to improve your score</li>
                </ul>
                <div class="quiz-xp-display">
                  <i class="fas fa-star"></i> 10 XP per correct answer
                </div>
              </div>
            </div>
          </div>
        </div>
        <div class="quiz-modal-footer">
          <div class="quiz-result hidden" id="topicQuizResult"></div>
          <div class="quiz-actions">
            <button type="button" class="btn btn-secondary" onclick="closeQuizModal()">
              Close
            </button>
          </div>
        </div>
      </div>
    </div>
