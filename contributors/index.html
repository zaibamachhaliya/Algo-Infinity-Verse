    <!-- Theme Initialization Script -->
    <script>
      (function () {
        try {
          var storedTheme = localStorage.getItem("theme");
          var prefersLight = window.matchMedia(
            "(prefers-color-scheme: light)",
          ).matches;
          var theme = storedTheme || (prefersLight ? "light" : "dark");
          if (theme === "light") {
            document.documentElement.classList.add("light-mode");
          } else {
            document.documentElement.classList.remove("light-mode");
          }
        } catch (e) {}
      })();
    </script>

    <script>
      const REPO_OWNER = "Eshajha19";
      const REPO_NAME = "Algo-Infinity-Verse";
      const CACHE_KEY = "algo_contributors_cache";
      const CACHE_TTL = 1000 * 60 * 30;

      function getCachedData() {
        try {
          const raw = localStorage.getItem(CACHE_KEY);
          if (!raw) return null;
          const parsed = JSON.parse(raw);
          if (Date.now() - parsed.timestamp > CACHE_TTL) return null;
          return parsed.data;
        } catch {
          return null;
        }
      }

      function setCachedData(data) {
        try {
          localStorage.setItem(
            CACHE_KEY,
            JSON.stringify({ data, timestamp: Date.now() }),
          );
        } catch {}
      }

      async function gh(url) {
        const res = await fetch(url, {
          headers: { Accept: "application/vnd.github.v3+json" },
        });
        if (!res.ok) {
          if (res.status === 403 || res.status === 429)
            throw new Error("RATE_LIMIT");
          throw new Error("GitHub API error: " + res.status);
        }
        return res;
      }

      async function ghJSON(url) {
        const res = await gh(url);
        return res.json();
      }

      async function fetchCommitCount(username) {
        const url =
          "https://api.github.com/repos/" +
          REPO_OWNER +
          "/" +
          REPO_NAME +
          "/commits?author=" +
          encodeURIComponent(username) +
          "&per_page=1";
        const res = await gh(url).catch(() => null);
        if (!res || !res.ok) return 0;
        const link = res.headers.get("Link") || "";
        const last = link.split(",").find((s) => s.includes('rel="last"'));
        if (last) {
          const m = last.match(/page=(\d+)/);
          if (m) return parseInt(m[1], 10);
        }
        const data = await res.json().catch(() => []);
        return Array.isArray(data) ? data.length : 0;
      }

      async function fetchContributorDetails(username) {
        return { rateLimited: false };
      }

      function getBadges(contributions, rank) {
        const badges = [];
        if (rank === 1)
          badges.push({
            label: '<i class="fas fa-trophy"></i> 1st place',
            cls: "gold",
          });
        else if (rank === 2)
          badges.push({
            label: '<i class="fas fa-medal"></i> 2nd place',
            cls: "silver",
          });
        else if (rank === 3)
          badges.push({
            label: '<i class="fas fa-award"></i> 3rd place',
            cls: "bronze",
          });
        else if (rank <= 10)
          badges.push({
            label: '<i class="fas fa-star"></i> Top 10',
            cls: "purple",
          });

        if (contributions >= 50)
          badges.push({
            label: '<i class="fas fa-fire"></i> 50+ commits',
            cls: "green",
          });
        else if (contributions >= 20)
          badges.push({
            label: '<i class="fas fa-rocket"></i> 20+ commits',
            cls: "blue",
          });
        else if (contributions >= 10)
          badges.push({
            label: '<i class="fas fa-code"></i> 10+ commits',
            cls: "blue",
          });
        return badges;
      }

      async function renderContributors(contributors) {
        const leaderboard = document.getElementById("leaderboard");
        const grid = document.getElementById("contributorsGrid");
        leaderboard.innerHTML = "";
        grid.innerHTML = "";

        const sorted = [...contributors].sort(
          (a, b) => (b.contributions || 0) - (a.contributions || 0),
        );

        sorted.slice(0, 5).forEach((c, i) => {
          const badges = getBadges(c.contributions || 0, i + 1);
          const item = document.createElement("div");
          item.className = "leaderboard-item";
          item.innerHTML = `
          <span class="leaderboard-rank">${i + 1}</span>
          <div class="leaderboard-avatar"><img src="${c.avatar_url}" alt="${c.login}" loading="lazy"></div>
          <div class="leaderboard-info">
            <div class="leaderboard-name">${c.login}</div>
            <div class="leaderboard-stats">
              <span><i class="fas fa-code-commit"></i> ${c.contributions || 0} commits</span>
            </div>
          </div>
          <div style="display:flex;flex-direction:row;flex-wrap:wrap;gap:6px;justify-content:flex-end;align-items:center;flex-shrink:0;">${badges.map((b) => '<span class="badge badge-' + b.cls + '">' + b.label + "</span>").join("")}</div>
        `;
          item.addEventListener("click", () => openModal(c, badges));
          leaderboard.appendChild(item);
        });

        contributors.forEach((c, i) => {
          const badges = getBadges(
            c.contributions || 0,
            sorted.findIndex((s) => s.login === c.login) + 1,
          );
          const card = document.createElement("div");
          card.className = "contributor-card";
          card.innerHTML = `
          <div class="contributor-avatar"><img src="${c.avatar_url}" alt="${c.login}" loading="lazy"></div>
          <div class="contributor-name">${c.login}</div>
          <div class="contributor-username">@${c.login}</div>
          <div class="contributor-badges">${badges.map((b) => '<span class="badge badge-' + b.cls + '">' + b.label + "</span>").join(" ")}</div>
          <div class="contributor-stats">
            <div class="stat"><span class="stat-value">${c.contributions || 0}</span><span class="stat-label">Commits</span></div>
          </div>
        `;
          card.addEventListener("click", () => openModal(c, badges));
          grid.appendChild(card);
        });
      }

      async function openModal(contributor, badges) {
        const modal = document.getElementById("contributorModal");
        const content = document.getElementById("modalContent");
        modal.classList.add("active");
        content.innerHTML =
          '<div class="loading-spinner"><i class="fas fa-spinner fa-spin"></i> Loading...</div>';

        const allCards = Array.from(
          document.querySelectorAll(".contributor-card"),
        );
        const leaderboardItems = Array.from(
          document.querySelectorAll(".leaderboard-item"),
        );
        const allContributors = [];
        allCards.forEach((card) => {
          const login = card
            .querySelector(".contributor-name")
            ?.textContent?.trim();
          if (login) allContributors.push(login);
        });
        leaderboardItems.forEach((item) => {
          const login = item
            .querySelector(".leaderboard-name")
            ?.textContent?.trim();
          if (login) allContributors.push(login);
        });
        const uniqueList = [...new Set(allContributors)];
        const rankIdx = uniqueList.indexOf(contributor.login);
        const rank = rankIdx >= 0 ? rankIdx + 1 : "?";

        content.innerHTML = `
        <div class="modal-avatar"><img loading="lazy" src="${contributor.avatar_url}" alt="${contributor.login}"></div>
        <div class="modal-name">${contributor.login}</div>
       <div class="modal-username">@${contributor.login} · <a href="${contributor.html_url}" target="_blank" rel="noopener" class="github-profile-btn"><i class="fab fa-github"></i> GitHub Profile</a></div>
        <div class="modal-stats-grid">
          <div class="modal-stat"><div class="modal-stat-value">#${rank}</div><div class="modal-stat-label">Rank</div></div>
          <div class="modal-stat"><div class="modal-stat-value">${contributor.contributions || 0}</div><div class="modal-stat-label">Total Commits</div></div>
        </div>
        <div class="modal-section">
          <h4>🏅 Achievements</h4>
          <div style="display:flex;flex-direction:row;flex-wrap:wrap;gap:6px;justify-content:flex-start;align-items:center;margin-top:0.5rem;">${badges.map((b) => '<span class="badge badge-' + b.cls + '">' + b.label + "</span>").join("")}</div>
        </div>
        <div class="modal-section" id="modalCommits">
          <h4>🔄 Latest Commits</h4>
          <div class="loading-spinner" style="padding: 1rem; font-size: 0.9rem;"><i class="fas fa-spinner fa-spin"></i> Fetching commits...</div>
        </div>
      `;

        try {
          const commitsData = await ghJSON(
            "https://api.github.com/repos/" +
              REPO_OWNER +
              "/" +
              REPO_NAME +
              "/commits?author=" +
              encodeURIComponent(contributor.login) +
              "&per_page=5",
          );
          const commitsContainer = document.getElementById("modalCommits");
          if (commitsData && commitsData.length > 0) {
            const commitsList = commitsData
              .map((c) => {
                const msg = c.commit.message.split("\n")[0];
                const url = c.html_url;
                const date = new Date(c.commit.author.date).toLocaleDateString(
                  "en-GB",
                ); // formats as dd/mm/yyyy
                return `<li><i class="fas fa-code-commit"></i> <a href="${url}" target="_blank" rel="noopener" style="flex: 1;">${msg}</a> <span class="meta-closed" style="margin-left: auto; white-space: nowrap; flex-shrink: 0;">(${date})</span></li>`;
              })
              .join("");
            commitsContainer.innerHTML = `<h4>🔄 Latest Commits</h4><ul class="modal-list">${commitsList}</ul>`;
          } else {
            commitsContainer.innerHTML = `<h4>🔄 Latest Commits</h4><p style="color:#9ca3af; font-size: 0.9rem;">No recent commits found.</p>`;
          }
        } catch (err) {
          const commitsContainer = document.getElementById("modalCommits");
          if (commitsContainer) {
            commitsContainer.innerHTML = `<h4>🔄 Latest Commits</h4><p style="color:#f87171; font-size: 0.9rem;">Could not load commits.</p>`;
          }
        }
      }

      document
        .getElementById("modalClose")
        .addEventListener("click", () =>
          document
            .getElementById("contributorModal")
            .classList.remove("active"),
        );
      document
        .getElementById("contributorModal")
        .addEventListener("click", (e) => {
          if (e.target.id === "contributorModal")
            document
              .getElementById("contributorModal")
              .classList.remove("active");
        });

      async function loadContributors() {
        const cached = getCachedData();
        if (cached) {
          await renderContributors(cached);
          return;
        }
        try {
          const data = await ghJSON(
            "https://api.github.com/repos/" +
              REPO_OWNER +
              "/" +
              REPO_NAME +
              "/contributors?per_page=100",
          );
          const filtered = data.filter((c) => c.type === "User");
          setCachedData(filtered);
          await renderContributors(filtered);
        } catch (err) {
          try {
            const fallbackRes = await fetch("/contributors/contributors.json");
            if (!fallbackRes.ok) throw new Error("Fallback JSON not found");
            const fallback = await fallbackRes.json();
            const filtered = fallback.filter(
              (c) => c.type === "User" || !c.type,
            );
            setCachedData(filtered);
            await renderContributors(filtered);
          } catch (e) {
            const leaderboard = document.getElementById("leaderboard");
            const grid = document.getElementById("contributorsGrid");
            let msg = "Failed to load contributors.";
            if (err.message === "RATE_LIMIT")
              msg = "GitHub API rate limit reached. Please try again later.";
            if (cached) {
              // we already rendered cached above, but just in case
              return;
            }
            leaderboard.innerHTML = '<p class="error-text">' + msg + "</p>";
            grid.innerHTML = '<p class="error-text">' + msg + "</p>";
          }
        }
      }

    window.addEventListener('DOMContentLoaded', loadContributors);
  </script>
</body>
</html>
