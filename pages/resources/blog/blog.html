<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blog | Algo Infinity Verse</title>
    <meta name="description" content="Articles, tutorials, and insights on algorithms, problem-solving, and software development." />
    
    <link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@300;400;500;600;700&family=Fira+Code:wght@400;500;600&display=swap"
    rel="stylesheet"
/>

<link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
/>

    
    <!-- External Stylesheets -->
    <link rel="stylesheet" href="/styles.css" />
    <link rel="stylesheet" href="blog.css" />

    <!-- Theme Initialization Script -->
    <script>
      (function() {
        try {
          var storedTheme = localStorage.getItem('theme');
          var prefersLight = window.matchMedia('(prefers-color-scheme: light)').matches;
          var theme = storedTheme || (prefersLight ? 'light' : 'dark');
          if (theme === 'light') {
            document.documentElement.classList.add('light-mode');
          } else {
            document.documentElement.classList.remove('light-mode');
          }
        } catch (e) {}
      })();
    </script>
</head>
<body>
    <div id="navbar-placeholder"></div>

    <!-- Hero Section -->
    <section id="blog-hero" class="hero blog-hero">
        <div class="hero-content">
            <h1 class="hero-title">
                <span class="title-line">Insights & Tutorials</span>
                <span class="main-title gradient-text-blog">The Infinity Blog</span>
                <span class="subtitle">
                    Dive deep into data structures, algorithm patterns, and interview strategies written by developers, for developers.
                </span>
            </h1>
        </div>
    </section>

    <!-- Main Blog Container -->
    <section id="blog-main" class="section">
        <div class="container">
            
            <!-- View 1: Blog Listing (Grid) -->
            <div id="blog-listing-view" class="view-active">
                <!-- Search and Filter Bar -->
                <div class="blog-controls">
                    <div class="search-bar">
                        <i class="fas fa-search"></i>
                        <input type="text" id="searchInput" placeholder="Search articles by title or keyword..." />
                    </div>
                    <div class="filter-tags" id="filterTags">
                        <button type="button" class="tag-btn active" data-tag="all">All</button>
                        <button type="button" class="tag-btn" data-tag="Algorithms">Algorithms</button>
                        <button type="button" class="tag-btn" data-tag="Interviews">Interviews</button>
                        <button type="button" class="tag-btn" data-tag="System Design">System Design</button>
                        <button type="button" class="tag-btn" data-tag="Guides">Guides</button>
                    </div>
                </div>

                <!-- Blog Grid -->
                <div class="blog-grid" id="blogGrid">
                    <!-- Cards populated by JavaScript -->
                </div>
                
                <!-- Empty State (Hidden by default) -->
                <div id="no-results" class="no-results" style="display: none;">
                    <i class="fas fa-ghost"></i>
                    <h3>No articles found</h3>
                    <p>Try adjusting your search or filters.</p>
                </div>
            </div>

            <!-- View 2: Individual Blog Post Detail -->
            <div id="blog-detail-view" class="view-hidden">
                <button type="button" class="btn-back" id="btnBack"><i class="fas fa-arrow-left"></i> Back to Articles</button>
                
                <article class="article-container">
                    <header class="article-header">
                        <div class="article-meta">
                            <span id="detailDate"><i class="far fa-calendar-alt"></i> Jan 1, 2026</span>
                            <span id="detailReadTime"><i class="far fa-clock"></i> 5 min read</span>
                        </div>
                        <h1 class="article-title" id="detailTitle">Article Title</h1>
                        <div class="article-tags" id="detailTags">
                            <!-- Tags populated by JS -->
                        </div>
                    </header>
                    
                    <!-- Formatted Content Area -->
                    <div class="article-content" id="detailContent">
                        <!-- Content populated by JS -->
                    </div>
                </article>
                
                <!-- Article Footer / Navigation -->
                <div class="article-footer">
                    <button type="button" class="btn-nav" id="btnPrev"><i class="fas fa-chevron-left"></i> Previous Post</button>
                    <button type="button" class="btn-nav" id="btnNext">Next Post <i class="fas fa-chevron-right"></i></button>
                </div>
            </div>

        </div>
    </section>
    
    <!-- External Scripts -->
    <div id="footer-placeholder"></div>

    <script src="/script.js"></script>
    <script src="/auth.js"></script>
    <script src="/theme.js"></script>
    <script src="/auth-gate.js"></script>
    <script src="blog.js"></script>

    <script>
      loadPartial('navbar-placeholder', '/partials/navbar.html');
      loadPartial('footer-placeholder', '/partials/footer.html');
    </script>
</body>
</html>
