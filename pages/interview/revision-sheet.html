<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Personalized Revision Sheet | Algo Infinity Verse</title>
    <meta name="description" content="A personalised interview revision sheet generated from your learning progress." />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@300;400;500;600;700&family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="/styles.css" />
    <link rel="stylesheet" href="revision-sheet.css" />
</head>
<body class="revision-sheet-body">
    <!-- Navbar (reuse existing component) -->
    <nav class="navbar">
        <div class="nav-logo">
            <span class="logo-text">∞</span>
            <span class="logo-title">Algo Infinity Verse</span>
        </div>
    </nav>

    <main class="revision-sheet container">
        <section class="header-section">
            <h1 class="page-title">Personalized Interview Revision Sheet</h1>
            <p class="subtitle">All the material you need, generated from the topics you have already mastered.</p>
            <div class="action-buttons">
                <button type="button" class="btn btn-primary" id="downloadBtn" aria-label="Download revision sheet as text file"><i class="fas fa-download"></i> Download (TXT)</button>
                <button type="button" class="btn btn-outline-primary" id="copyBtn" aria-label="Copy revision sheet to clipboard"><i class="fas fa-copy"></i> Copy to Clipboard</button>
                <button type="button" class="btn btn-outline-secondary" id="printBtn" aria-label="Print revision sheet"><i class="fas fa-print"></i> Print</button>
            </div>
        </section>

        <section id="revisionContent" class="revision-content"></section>
    </main>

    <script src="/script.js"></script>
    <script type="module" src="revision-sheet.js"></script>
</body>
</html>
