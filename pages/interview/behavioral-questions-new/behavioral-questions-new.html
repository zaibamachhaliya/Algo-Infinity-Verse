<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Behavioral Interview Prep | Algo Infinity Verse</title>
    <meta name="description" content="Ace your behavioral interviews using the STAR method. Optimized paginated list of common culture-fit questions." />
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@300;400;500;600;700&family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    
    <!-- External Stylesheets -->
    <link rel="stylesheet" href="/styles.css" />
    <link rel="stylesheet" href="/pages/interview/behavioral-questions/behavioral-questions.css" />

    <!-- Theme Initialization Script -->
    <script>
      (function() {
        try {
          var storedTheme = localStorage.getItem('theme');
          var prefersLight = window.matchMedia('(prefers-color-scheme: light)').matches;
          var theme = storedTheme || (prefersLight ? 'light' : 'dark');
          if (theme === 'light') {
            document.documentElement.classList.add('light-mode');
          } else {
            document.documentElement.classList.remove('light-mode');
          }
        } catch (e) {}
      })();
    </script>
</head>
<body data-page="behavioral-questions-new">
    <div id="navbar-placeholder"></div>

    <!-- Hero Section -->
    <section class="hero beh-hero">
        <div class="hero-content">
            <h1 class="hero-title">
                <span class="title-line">Master the Soft Skills</span>
                <span class="main-title gradient-text-beh">Behavioral Interviews</span>
                <span class="subtitle">
                    Craft perfect responses using the S.T.A.R. Method (Situation, Task, Action, Result). Over 100+ questions optimized for fast browsing.
                </span>
            </h1>
        </div>
    </section>

    <!-- Main Content Section -->
    <section class="section">
        <div class="container">
            
            <div class="beh-controls">
                <div class="search-bar">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="Search questions or keywords..." aria-label="Search questions" />
                </div>
                
                <div class="filter-group" id="categoryFilters">
                    <button type="button" class="filter-btn active" data-category="all">All</button>
                    <button type="button" class="filter-btn" data-category="Leadership">Leadership</button>
                    <button type="button" class="filter-btn" data-category="Conflict">Conflict</button>
                    <button type="button" class="filter-btn" data-category="Failure">Failure</button>
                    <button type="button" class="filter-btn" data-category="Teamwork">Teamwork</button>
                </div>
            </div>

            <!-- Virtualized/Paginated Container -->
            <div class="questions-wrapper">
                <div class="loading-state" id="loadingState" style="display: none;">
                    <i class="fas fa-circle-notch fa-spin"></i> Loading Questions...
                </div>
                
                <div class="questions-list" id="questionsList">
                    <!-- DOM Nodes injected here by JS based on current page -->
                </div>

                <div class="no-results" id="noResults" style="display: none;">
                    <i class="fas fa-search-minus"></i>
                    <p>No questions found matching your criteria.</p>
                </div>
            </div>

            <!-- Pagination Controls -->
            <div class="pagination-controls" id="paginationControls">
                <!-- Pagination buttons injected by JS -->
            </div>

        </div>
    </section>
    
    <!-- External Scripts -->
    <script src="/script.js"></script>
    <script src="/auth.js"></script>
    <script src="/theme.js"></script>
    <script src="/pages/interview/behavioral-questions/behavioral-questions.js"></script>

  <script>
    loadPartial('navbar-placeholder', '/partials/navbar.html');
    loadPartial('footer-placeholder', '/partials/footer.html');
  </script>
</body>
</html>
