<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reverse Complexity Challenge | Algo Infinity Verse</title>
    <link rel="stylesheet" href="/styles.css">
    <link rel="stylesheet" href="reverse-complexity.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@300;400;500;600;700&family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Theme Initialization Script -->
    <script>
      (function() {
        try {
          var storedTheme = localStorage.getItem('theme');
          var prefersLight = window.matchMedia('(prefers-color-scheme: light)').matches;
          var theme = storedTheme || (prefersLight ? 'light' : 'dark');
          if (theme === 'light') {
            document.documentElement.classList.add('light-mode');
          } else {
            document.documentElement.classList.remove('light-mode');
          }
        } catch (e) {}
      })();
    </script>
</head>
<body class="challenge-mode">
<body class="challenge-mode" data-page="reverse-complexity">
    <!-- Loading Screen -->
    <div id="loading-screen" class="hidden">
        <div class="loader">
            <div class="infinity-loader">∞</div>
            <h2>Generating Challenge...</h2>
            <div class="loading-bar">
                <div class="loading-progress"></div>
            </div>
        </div>
    </div>

    <!-- Navigation Bar (Shared with index.html) -->
    <div id="navbar-placeholder"></div>

    <main class="challenge-container">
        <header class="challenge-header card-glass">
            <div class="challenge-meta">
                <span id="topic-badge" class="badge">Arrays</span>
                <span id="difficulty-badge" class="badge secondary">Easy</span>
            </div>
            <h1>Reverse Complexity Challenge</h1>
            <p>Match the target complexity to the correct code snippet below.</p>
            
            <div class="target-complexity-box">
                <span class="target-label">Target Complexity:</span>
                <div id="target-complexity" class="complexity-badge-pulse">O(n)</div>
            </div>

            <div class="game-stats">
                <div class="stat-item">
                    <i class="fas fa-bolt"></i>
                    <span id="score">0</span> XP
                </div>
                <div class="stat-item">
                    <i class="fas fa-clock"></i>
                    <span id="timer">30</span>s
                </div>
                <div class="stat-item">
                    <i class="fas fa-fire"></i>
                    <span id="streak">0</span> Streak
                </div>
            </div>
        </header>

        <section class="options-grid" id="options-grid">
            <!-- Code snippets will be injected here by reverse-complexity.js -->
            <div class="option-card-skeleton"></div>
            <div class="option-card-skeleton"></div>
            <div class="option-card-skeleton"></div>
            <div class="option-card-skeleton"></div>
        </section>

        <!-- Feedback Overlay (Modal) -->
        <div id="feedback-modal" class="modal-overlay hidden">
            <div class="modal-content card-glass">
                <div id="feedback-icon"></div>
                <h2 id="feedback-title">Correct!</h2>
                <div id="feedback-explanation" class="explanation-box"></div>
                <button type="button" id="next-btn" class="btn-primary">Next Challenge</button>
            </div>
        </div>

        <!-- Progress Tracking Panel -->
        <aside class="progress-panel card-glass">
            <h3>Session Progress</h3>
            <div class="progress-bar-container">
                <div id="challenge-progress" class="progress-bar" style="width: 0%;"></div>
            </div>
            <p id="progress-text">Challenge 0 of 10</p>
        </aside>
    </main>

    <footer class="footer card-glass">
        <p>&copy; 2026 Algo Infinity Verse. Master DSA through Active Challenges.</p>
    </footer>

    <!-- Scripts -->
    <script src="/script.js"></script>
    <script src="/theme.js"></script>
    <script src="/auth.js"></script> <!-- Reuses addXP and userProgress logic -->
    <script src="reverse-complexity.js"></script>

  <script>
    loadPartial('navbar-placeholder', '/partials/navbar.html');
    loadPartial('footer-placeholder', '/partials/footer.html');
  </script>
</body>
</html>
