<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile - Algo Infinity Verse</title>
    <link rel="stylesheet" href="public-profile.css" />
    <link rel="stylesheet" href="../../styles.css" />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&amp;family=Poppins:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>
<body>
    <div id="navbar-placeholder"></div>

    <div class="profile-container">
        <div class="profile-card glass-card big-box">
            <div class="profile-header">
                <div class="profile-avatar" id="profileAvatar">🚀</div>
                <div class="profile-name-section">
                    <h1 id="profileName">John Doe</h1>
                    <p class="profile-username" id="profileUsername">@johndoe</p>
                    <p class="profile-bio" id="profileBio">Passionate about DSA and building cool stuff!</p>
                    <p class="profile-joined"><i class="fas fa-calendar-alt"></i> Joined: <span id="joinedDate">2024-01-15</span></p>
                </div>
                <button type="button" class="share-btn" id="shareProfileBtn">
                    <i class="fas fa-share-alt"></i> Share
                </button>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value" id="statSolved">45</div>
                    <div class="stat-label">Problems Solved</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="statXP">2,800</div>
                    <div class="stat-label">Total XP</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="statStreak">7</div>
                    <div class="stat-label">Day Streak</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="statLevel">4</div>
                    <div class="stat-label">Level</div>
                </div>
            </div>

            <div class="profile-section">
                <h3><i class="fas fa-trophy"></i> Badges</h3>
                <div class="badges-grid" id="badgesGrid"></div>
            </div>

            <div class="profile-section">
                <h3><i class="fas fa-code"></i> Programming Languages</h3>
                <div class="languages-list" id="languagesList"></div>
            </div>

            <div class="profile-section">
                <h3><i class="fas fa-folder-open"></i> Projects</h3>
                <div class="projects-grid" id="projectsGrid"></div>
            </div>

            <div class="profile-section">
                <h3><i class="fas fa-clock"></i> Recent Activity</h3>
                <div class="activity-list" id="activityList"></div>
            </div>
        </div>
    </div>

    <div id="footer-placeholder"></div>

    <script src="../../auth.js"></script>
    <script src="public-profile.js"></script>
</body>
</html>
