<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DSA Glossary & Dictionary | Algo Infinity Verse</title>
  <link rel="stylesheet" href="../../styles.css" />
  <link rel="stylesheet" href="dsa-glossary.css" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@300;400;500;600;700&family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />

  <script>
    (function () {
      try {
        var storedTheme = localStorage.getItem('theme');
        var prefersLight = window.matchMedia('(prefers-color-scheme: light)').matches;
        var theme = storedTheme || (prefersLight ? 'light' : 'dark');
        if (theme === 'light') {
          document.documentElement.classList.add('light-mode');
        } else {
          document.documentElement.classList.remove('light-mode');
        }
      } catch (e) {}
    })();
  </script>
</head>
<body data-page="dsa-glossary">
  <div id="loading-screen">
    <div class="loader">
      <div class="infinity-loader">∞</div>
      <h2>Algo Infinity Verse</h2>
      <div class="loading-bar"><div class="loading-progress"></div></div>
    </div>
  </div>

  <button type="button" id="scrollTopBtn" class="scroll-top-btn" aria-label="Scroll to top">
    <i class="fas fa-circle-chevron-up"></i>
  </button>

  <nav class="navbar">
    <div class="nav-logo">
      <span class="logo-text">∞</span>
      <span class="logo-title">Algo Infinity Verse</span>
    </div>
    <ul class="nav-links" id="navLinks">
      <li class="nav-item"><a href="../../index.html#home" class="nav-link">Home</a></li>
      <li class="nav-item has-dropdown">
        <a href="../../index.html#topics" class="nav-link">Learn</a>
      </li>
      <li class="nav-item">
        <a href="../../index.html#resources" class="nav-link">Resources</a>
      </li>
      <li class="nav-item">
        <a href="dsa-glossary.html" class="nav-link active">Glossary</a>
      </li>
    </ul>
    <div class="nav-buttons">
      <button type="button" id="darkModeToggle" class="dark-mode-btn" aria-label="Toggle dark mode"><i class="fas fa-moon"></i></button>
      <button type="button" id="menuToggle" class="menu-toggle" aria-label="Toggle navigation menu" aria-expanded="false"><i class="fas fa-bars"></i></button>
    </div>
  </nav>

  <div id="navbar-placeholder"></div>

  <section class="section">
    <div class="container">
      <h1 class="page-title">DSA Glossary & Dictionary</h1>
      <p class="page-subtitle">Search, filter, and learn common Data Structures & Algorithms terms.</p>

      <div class="dsa-glossary-searchbar" role="search">
        <div class="input-group">
          <label for="dsaGlossarySearch" class="sr-only">Search DSA terms</label>
          <i class="fas fa-magnifying-glass searchbar-icon" aria-hidden="true"></i>
          <input
            id="dsaGlossarySearch"
            class="search-bar"
            type="search"
            placeholder="Search terms (e.g., BFS, DP, Union-Find)..."
            autocomplete="off"
          />
          <button id="dsaGlossaryClear" class="dsa-glossary-clear" type="button" aria-label="Clear search">
            <i class="fas fa-xmark"></i>
          </button>
        </div>

        <div class="dsa-glossary-meta" aria-live="polite">
          <span>Total:</span> <strong id="dsaGlossaryCount">0</strong>
        </div>
      </div>

      <div id="dsaGlossaryGroups" class="dsa-glossary-groups" aria-live="polite"></div>
    </div>
  </section>

  <div id="footer-placeholder"></div>

  <script src="/theme.js"></script>
  <script type="module" src="dsa-glossary.js"></script>
  <script src="/script.js"></script>
</body>
</html>
