<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Repository Analyzer - Algo Infinity Verse</title>
    <link rel="stylesheet" href="/styles.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@300;400;500;600;700&family=Fira+Code:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      .repo-analyzer-container {
        max-width: 800px;
        margin: 0 auto;
        padding: 2rem;
      }
      .repo-input-group {
        display: flex;
        gap: 1rem;
        margin-bottom: 2rem;
      }
      .repo-input-group input {
        flex: 1;
        padding: 1rem;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        background: rgba(255, 255, 255, 0.05);
        color: var(--text-color);
        font-family: 'Fira Code', monospace;
      }
      .score-circle {
        width: 150px;
        height: 150px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 3rem;
        font-weight: 700;
        margin: 0 auto 2rem auto;
        background: rgba(255, 255, 255, 0.05);
        border: 4px solid var(--primary-color);
        box-shadow: 0 0 20px rgba(96, 165, 250, 0.3);
      }
      .results-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1.5rem;
        margin-bottom: 2rem;
      }
      .result-card {
        background: rgba(255, 255, 255, 0.03);
        padding: 1.5rem;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        text-align: center;
      }
      .result-icon {
        font-size: 2rem;
        margin-bottom: 1rem;
      }
      .icon-success { color: #4ade80; }
      .icon-error { color: #f87171; }
      .recommendations-list {
        list-style: none;
        padding: 0;
      }
      .recommendations-list li {
        padding: 1rem;
        background: rgba(255, 255, 255, 0.03);
        margin-bottom: 0.5rem;
        border-radius: 8px;
        border-left: 4px solid var(--primary-color);
      }
    </style>
  
    <!-- Theme Initialization Script -->
    <script>
      (function() {
        try {
          var storedTheme = localStorage.getItem('theme');
          var prefersLight = window.matchMedia('(prefers-color-scheme: light)').matches;
          var theme = storedTheme || (prefersLight ? 'light' : 'dark');
          if (theme === 'light') {
            document.documentElement.classList.add('light-mode');
          } else {
            document.documentElement.classList.remove('light-mode');
          }
        } catch (e) {}
      })();
    </script>
</head>
  <body data-page="repo-analyzer">
    <!-- Loading Screen -->
    <div id="loading-screen">
      <div class="loader">
        <div class="infinity-loader">∞</div>
        <h2>Algo Infinity Verse</h2>
      </div>
    </div>

    <!-- Navigation Bar -->
    <div id="navbar-placeholder"></div>

    <div class="spacer" style="height: 100px;"></div>

    <section class="section">
      <div class="container repo-analyzer-container">
        <div class="text-center mb-5">
          <h1 class="gradient-text"><i class="fas fa-code-branch"></i> Repository Analyzer</h1>
          <p>Scan your GitHub repository for functional CI/CD automation and best practices.</p>
        </div>

        <div class="glass-card p-4">
          <div class="repo-input-group">
            <input type="url" id="repoUrlInput" placeholder="https://github.com/username/repository" required />
            <button type="button" id="analyzeBtn" class="btn btn-primary">
              <i class="fas fa-search"></i> Analyze
            </button>
          </div>

          <div id="loadingIndicator" style="display: none; text-align: center; margin: 2rem 0;">
            <i class="fas fa-spinner fa-spin fa-3x gradient-text"></i>
            <p class="mt-3">Analyzing Workflows...</p>
          </div>

          <div id="resultsContainer" style="display: none;">
            <div class="score-circle gradient-text" id="scoreDisplay">0</div>
            
            <div class="results-grid">
              <div class="result-card">
                <div class="result-icon" id="depsIcon"><i class="fas fa-box"></i></div>
                <h4>Dependencies</h4>
                <p id="depsText">Pending</p>
              </div>
              <div class="result-card">
                <div class="result-icon" id="testsIcon"><i class="fas fa-vial"></i></div>
                <h4>Automated Tests</h4>
                <p id="testsText">Pending</p>
              </div>
            </div>

            <h3 class="mb-3"><i class="fas fa-lightbulb"></i> Recommendations</h3>
            <ul class="recommendations-list" id="recommendationsList">
            </ul>
          </div>
        </div>
      </div>
    </section>

    <!-- Footer -->
    <div id="footer-placeholder"></div>

    <script type="module" src="repo-analyzer.js"></script>
    <script src="/auth.js"></script>
    <script src="/script.js"></script>
    <script>
      loadPartial('navbar-placeholder', '/partials/navbar.html');
      loadPartial('footer-placeholder', '/partials/footer.html');
    </script>
  </body>
</html>
