<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algo Infinity Verse | Wavelet Tree Visualizer</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Orbitron:wght@500;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <link rel="stylesheet" href="wavelet-tree.css">
</head>
<body>
    <div class="cyber-layout">
        <header class="hud-header">
            <div class="brand">
                <i class="fas fa-network-wired neon-cyan"></i>
                <h1>WAVELET_TREE <span>// RANGE QUERY ENGINE</span></h1>
            </div>
            <div class="telemetry-badges">
                <span class="badge time"><i class="fas fa-stopwatch"></i> Time: $O(\log \Sigma)$</span>
                <span class="badge space"><i class="fas fa-memory"></i> Space: $O(N \log \Sigma)$</span>
            </div>
        </header>

        <main class="workspace">
            <aside class="control-panel glass-panel">
                <h2 class="panel-title"><i class="fas fa-terminal"></i> INIT_PARAMETERS</h2>
                
                <div class="input-group">
                    <label>Input Sequence (Comma Separated)</label>
                    <input type="text" id="arr-input" value="6,2,0,7,9,3,1,8,5,4" class="cyber-input">
                    <button type="button" id="btn-build" class="cyber-btn primary"><i class="fas fa-cogs"></i> Build Tree</button>
                </div>

                <div class="divider"></div>

                <h2 class="panel-title"><i class="fas fa-search"></i> EXECUTE_QUERY</h2>
                
                <div class="query-selector">
                    <button type="button" id="btn-mode-rank" class="mode-btn active">Rank(L, R, x)</button>
                    <button type="button" id="btn-mode-kth" class="mode-btn">K-th Smallest(L, R, k)</button>
                </div>

                <div class="query-params" id="query-inputs">
                    </div>

                <button type="button" id="btn-query" class="cyber-btn accent"><i class="fas fa-bolt"></i> Run Query</button>

                <div class="divider"></div>

                <h2 class="panel-title"><i class="fas fa-list-check"></i> EXECUTION_LOG</h2>
                <div id="execution-log" class="terminal-log">
                    <div class="log-entry system">[SYSTEM] Awaiting Tree Construction...</div>
                </div>
            </aside>

            <section class="visualization-stage glass-panel">
                <svg id="tree-canvas" width="100%" height="100%"></svg>
            </section>
        </main>
    </div>

    <script src="wavelet-tree.js"></script>
</body>
</html>
