<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Minimax & Alpha-Beta Pruning | Algo Infinity Verse</title>
    <meta name="description" content="Interactive visualizer for Game Theory Minimax and Alpha-Beta Pruning algorithms." />
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@300;400;500;600;700&family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    
    <!-- External Stylesheets -->
    <link rel="stylesheet" href="/styles.css" />
    <link rel="stylesheet" href="minimax-visualizer.css" />
    
    <!-- Theme Initialization Script -->
    <script>
      (function() {
        try {
          var storedTheme = localStorage.getItem('theme');
          var prefersLight = window.matchMedia('(prefers-color-scheme: light)').matches;
          var theme = storedTheme || (prefersLight ? 'light' : 'dark');
          if (theme === 'light') {
            document.documentElement.classList.add('light-mode');
          } else {
            document.documentElement.classList.remove('light-mode');
          }
        } catch (e) {}
      })();
    </script>
</head>
<body class="vis-body">

    <nav class="navbar vis-nav">
        <div class="nav-logo">
            <span class="logo-text">∞</span>
            <span class="logo-title">Algo Infinity Verse</span>
        </div>
        <div class="nav-links">
            <a href="/index.html"><i class="fas fa-home"></i> Home</a>
            <a href="/pages/visualizers/visualizers.html"><i class="fas fa-shapes"></i> Visualizers</a>
        </div>
    </nav>

    <main class="vis-workspace">
        
        <!-- Left Panel: Controls & Board -->
        <aside class="vis-sidebar" style="flex: 0 0 350px;">
            <div class="sidebar-header">
                <h3><i class="fas fa-chess-knight"></i> Minimax AI</h3>
            </div>
            
            <div class="sidebar-content">
                
                <div class="control-group">
                    <label>Algorithm Mode:</label>
                    <select id="algoSelect">
                        <option value="alphabeta">Minimax with Alpha-Beta Pruning</option>
                        <option value="minimax">Standard Minimax (No Pruning)</option>
                    </select>
                </div>
                
                <div class="control-group">
                    <label>Search Depth Limit: <span id="depthVal">9</span></label>
                    <input type="range" id="depthSlider" min="1" max="9" value="9">
                    <small>Higher depths explore more future states.</small>
                </div>
                
                <div class="control-group">
                    <label>Who Starts?</label>
                    <div style="display: flex; gap: 10px;">
                        <button type="button" class="btn-primary" id="btnHumanStart" style="flex: 1;">Human (X)</button>
                        <button type="button" class="btn-secondary" id="btnAIStart" style="flex: 1;">AI (O)</button>
                    </div>
                </div>

                <div class="control-group">
                    <button type="button" id="btnResetGame" class="btn-secondary" style="width: 100%; margin-top: 10px;">
                        <i class="fas fa-undo"></i> Reset Game
                    </button>
                </div>

                <hr style="border-color: var(--border-color); margin: 20px 0;">

                <div class="game-board-container">
                    <h4 style="text-align: center; margin-bottom: 10px;">Tic-Tac-Toe</h4>
                    <div id="gameStatus" style="text-align: center; margin-bottom: 10px; font-weight: bold; color: var(--accent-color);">Your Turn (X)</div>
                    <div class="tic-tac-toe-board" id="ticTacToeBoard">
                        <!-- 9 Cells generated by JS -->
                    </div>
                </div>

            </div>
        </aside>
        
        <!-- Right Panel: Tree Visualization -->
        <section class="vis-main">
            <div class="panel tree-panel" style="display: flex; flex-direction: column; height: 100%;">
                
                <div class="panel-header" style="display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; border-bottom: 1px solid var(--border-color);">
                    <h4>Decision Tree Visualization</h4>
                    
                    <div class="playback-controls" style="display: flex; align-items: center; gap: 10px;">
                        <button type="button" id="btnPlayPause" class="btn-control" title="Play/Pause AI Search" disabled><i class="fas fa-play"></i></button>
                        <button type="button" id="btnStep" class="btn-control" title="Step Forward" disabled><i class="fas fa-step-forward"></i></button>
                        <div class="speed-control">
                            <label><i class="fas fa-tachometer-alt"></i></label>
                            <input type="range" id="speedSlider" min="1" max="5" value="3">
                        </div>
                    </div>

                    <div class="graph-controls" style="display: flex; gap: 8px;">
                        <button type="button" id="btnZoomIn" class="btn-secondary" title="Zoom In"><i class="fas fa-search-plus"></i></button>
                        <button type="button" id="btnZoomOut" class="btn-secondary" title="Zoom Out"><i class="fas fa-search-minus"></i></button>
                        <button type="button" id="btnResetView" class="btn-secondary" title="Reset View / Fit"><i class="fas fa-compress-arrows-alt"></i></button>
                    </div>
                </div>
                
                <div id="treeContainer" style="flex: 1; position: relative; overflow: hidden; background: var(--bg-primary);">
                    <svg id="treeSvg" width="100%" height="100%"></svg>
                    
                    <div id="treeOverlay" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; pointer-events: none;">
                        <h2 style="color: var(--text-muted); opacity: 0.5;">Play a move to watch AI think</h2>
                    </div>
                </div>
                
                <!-- Metrics Panel at bottom -->
                <div class="metrics-panel" style="padding: 10px 20px; border-top: 1px solid var(--border-color); background: var(--bg-secondary); display: flex; justify-content: space-around; font-family: 'Fira Code', monospace; font-size: 14px;">
                    <div>Nodes Evaluated: <span id="statNodes" class="highlight-text">0</span></div>
                    <div>Branches Pruned: <span id="statPruned" class="highlight-text">0</span></div>
                    <div>Best Score: <span id="statScore" class="highlight-text">-</span></div>
                </div>

            </div>
        </section>

    </main>

    <!-- D3.js -->
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="minimax-visualizer.js"></script>
</body>
</html>
