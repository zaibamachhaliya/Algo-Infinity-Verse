<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive SDLC Visualizer | Algo Infinity Verse</title>
  <meta name="description" content="Explore the Software Development Lifecycle interactively — from Requirements to Maintenance, with animated transitions and detailed stage content.">

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="/styles.css">
  <link rel="stylesheet" href="/styles.css" />
  <link rel="stylesheet" href="sdlc-visualizer.css">
</head>

<body class="sdlc-body">

  <!-- ══════════════════════════════════
       NAVBAR
  ══════════════════════════════════ -->
  <nav class="sdlc-navbar">
    <div class="sdlc-nav-logo">
      <span class="sdlc-infinity">∞</span>
      <h2>Algo Infinity Verse</h2>
    </div>
    <div class="sdlc-engine-badge">
      <i class="fas fa-diagram-project"></i>
      SDLC Visualizer
    </div>
  </nav>

  <!-- ══════════════════════════════════
       HERO
  ══════════════════════════════════ -->
  <section class="sdlc-hero">
    <div class="sdlc-hero-glow"></div>
    <div class="sdlc-hero-content">
      <span class="sdlc-hero-badge">Software Engineering</span>
      <h1 class="sdlc-hero-title">
        Software Development
        <span class="sdlc-gradient-text">Lifecycle</span>
      </h1>
      <p class="sdlc-hero-sub">
        Explore all <strong>7 phases</strong> of the SDLC interactively —
        from idea to deployment to maintenance.
        Click any stage or use the auto-tour.
      </p>

      <!-- Overall progress bar -->
      <div class="sdlc-global-progress">
        <div class="sdlc-gp-dots" id="globalDots"></div>
        <div class="sdlc-gp-label">
          <span id="globalLabel">Phase 1 of 7</span>
        </div>
      </div>
    </div>
  </section>

  <!-- ══════════════════════════════════
       WORKSPACE
  ══════════════════════════════════ -->
  <div class="sdlc-workspace">

    <!-- ────── LEFT: PIPELINE ────── -->
    <aside class="sdlc-pipeline-panel">

      <!-- Auto-tour controls -->
      <div class="sdlc-tour-bar">
        <button type="button" id="tourBtn" class="sdlc-tour-btn">
          <i class="fas fa-play" id="tourIcon"></i>
          <span id="tourLabel">Auto Tour</span>
        </button>
        <div class="sdlc-tour-speed">
          <label>Speed</label>
          <input type="range" id="tourSpeed" min="1500" max="5000" step="500" value="3000">
        </div>
      </div>

      <!-- Pipeline of stages -->
      <div class="sdlc-pipeline" id="pipeline">
        <!-- Injected by JS -->
      </div>

    </aside>

    <!-- ────── RIGHT: DETAIL PANEL ────── -->
    <main class="sdlc-detail-panel">

      <!-- Stage header -->
      <div class="sdlc-detail-header" id="detailHeader">
        <div class="sdlc-dh-icon-wrap">
          <div class="sdlc-dh-icon" id="detailIcon">
            <i class="fas fa-clipboard-list"></i>
          </div>
        </div>
        <div class="sdlc-dh-info">
          <span class="sdlc-phase-badge" id="phaseBadge">Phase 1 of 7</span>
          <h2 class="sdlc-stage-title" id="stageTitle">Requirements</h2>
          <p  class="sdlc-stage-tagline" id="stageTagline">Define what needs to be built</p>
        </div>
      </div>

      <!-- Tab bar -->
      <div class="sdlc-tabs" id="tabBar">
        <button type="button" class="sdlc-tab active" data-tab="overview">
          <i class="fas fa-circle-info"></i> Overview
        </button>
        <button type="button" class="sdlc-tab" data-tab="objectives">
          <i class="fas fa-bullseye"></i> Objectives
        </button>
        <button type="button" class="sdlc-tab" data-tab="deliverables">
          <i class="fas fa-boxes-stacked"></i> Deliverables
        </button>
        <button type="button" class="sdlc-tab" data-tab="practices">
          <i class="fas fa-star"></i> Best Practices
        </button>
        <button type="button" class="sdlc-tab" data-tab="tools">
          <i class="fas fa-wrench"></i> Tools
        </button>
        <button type="button" class="sdlc-tab" data-tab="questions">
          <i class="fas fa-comments"></i> Interview Q
        </button>
      </div>

      <!-- Tab content -->
      <div class="sdlc-tab-content" id="tabContent">
        <!-- Injected by JS -->
      </div>

      <!-- Prev / Next navigation -->
      <div class="sdlc-nav-bar">
        <button type="button" class="sdlc-nav-btn" id="prevBtn">
          <i class="fas fa-arrow-left"></i> Previous
        </button>
        <div class="sdlc-mini-dots" id="miniDots"></div>
        <button type="button" class="sdlc-nav-btn sdlc-nav-next" id="nextBtn">
          Next <i class="fas fa-arrow-right"></i>
        </button>
      </div>

    </main>
  </div>

  <script src="/script.js"></script>
  <script src="sdlc-visualizer.js"></script>
</body>
</html>
