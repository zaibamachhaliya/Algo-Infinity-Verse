<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Convex Hull Visualizer</title>
    <link rel="stylesheet" href="convex-hull.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>
<body>
    <div class="container">
        <h1><i class="fas fa-shapes"></i> Convex Hull Visualizer</h1>

        <!-- Controls -->
        <div class="controls">
            <button type="button" onclick="runGrahamScan()" class="btn btn-primary">
                <i class="fas fa-arrow-right"></i> Graham Scan
            </button>
            <button type="button" onclick="runJarvisMarch()" class="btn btn-success">
                <i class="fas fa-arrow-right"></i> Jarvis March
            </button>
            <button type="button" onclick="runMonotonicChain()" class="btn btn-warning">
                <i class="fas fa-arrow-right"></i> Monotonic Chain
            </button>
            <button type="button" onclick="generatePoints()" class="btn btn-secondary">
                <i class="fas fa-random"></i> Generate Points
            </button>
            <button type="button" onclick="clearPoints()" class="btn btn-danger">
                <i class="fas fa-trash"></i> Clear
            </button>
            <button type="button" onclick="resetAll()" class="btn btn-dark">
                <i class="fas fa-undo"></i> Reset
            </button>
        </div>

        <!-- Canvas -->
        <div class="canvas-wrapper">
            <canvas id="canvas" width="900" height="550"></canvas>
        </div>

        <!-- Info Panel -->
        <div class="info-panel">
            <div class="info-item">
                <span class="info-label">Points:</span>
                <span class="info-value" id="pointCount">0</span>
            </div>
            <div class="info-item">
                <span class="info-label">Hull Size:</span>
                <span class="info-value" id="hullSize">0</span>
            </div>
            <div class="info-item">
                <span class="info-label">Algorithm:</span>
                <span class="info-value" id="algorithm">None</span>
            </div>
            <div class="info-item">
                <span class="info-label">Time:</span>
                <span class="info-value" id="timeTaken">0ms</span>
            </div>
            <div class="info-item">
                <span class="info-label">Complexity:</span>
                <span class="info-value" id="complexity">O(n log n)</span>
            </div>
        </div>

        <!-- Message -->
        <div id="message" class="message"></div>
    </div>

    <script src="convex-hull.js"></script>
</body>
</html>
