<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Circular Linked List Simulator</title>
    <link rel="stylesheet" href="circular-linked-list.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>
<body>
    <div class = "container">
        <h1><i class = "fas fa-sync-alt"></i>Circular Linked List Simulator</h1>
    </div>
    <div class="controls">
            <button onclick="insertAtBeginning()" class="btn btn-primary">
                <i class="fas fa-plus-circle"></i> Insert Beginning
            </button>
            <button onclick="insertAtEnd()" class="btn btn-primary">
                <i class="fas fa-plus-circle"></i> Insert End
            </button>
            <button onclick="insertAtPosition()" class="btn btn-primary">
                <i class="fas fa-plus-circle"></i> Insert At Position
            </button>
            <button onclick="deleteNode()" class="btn btn-danger">
                <i class="fas fa-trash"></i> Delete Value
            </button>
            <button onclick="deleteAtPosition()" class="btn btn-danger">
                <i class="fas fa-trash"></i> Delete At Position
            </button>
            <button onclick="traverseCircular()" class="btn btn-success">
                <i class="fas fa-arrow-right"></i> Traverse
            </button>
            <button onclick="josephusDemo()" class="btn btn-warning">
                <i class="fas fa-skull"></i> Josephus Demo
            </button>
            <button onclick="resetList()" class="btn btn-secondary">
                <i class="fas fa-undo"></i> Reset
            </button>
        </div>

        <!-- Input Area -->
        <div class="input-area">
            <input type="text" id="nodeValue" placeholder="Enter value..." />
            <input type="number" id="position" placeholder="Position..." min="0" />
            <input type="number" id="stepValue" placeholder="Josephus Step..." value="2" min="1" />
            <button onclick="addSampleData()" class="btn btn-primary">
                <i class="fas fa-database"></i> Sample Data
            </button>
        </div>

        <!-- Visualizer -- >
        <div class = "visualizer",id="visualizer">
            <p class="empty-message">🔘 Empty list. Add nodes to visualize!</p>
        </div>
        
        <!-- Info Panel -->
        <div class="info-panel">
            <div class="info-item">
                <span class="info-label">Size:</span>
                <span class="info-value" id="size">0</span>
            </div>
            <div class="info-item">
                <span class="info-label">Head:</span>
                <span class="info-value" id="head">null</span>
            </div>
            <div class="info-item">
                <span class="info-label">Tail:</span>
                <span class="info-value" id="tail">null</span>
            </div>
            <div class="info-item">
                <span class="info-label">Status:</span>
                <span class="info-value" id="status">Ready</span>
            </div>
        </div>

        <!-- Message -->
        <div id="message" class="message"></div>
    </div>

    <script src="circular-linked-list.js"></script>
</body>
</html>
