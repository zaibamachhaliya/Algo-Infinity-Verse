<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TSP AI Heuristics | Algo Infinity Verse</title>
    <link rel="stylesheet" href="tsp-heuristics.css">
    <script src="tsp-heuristics.js" defer></script>
</head>
<body>
    <div class="glass-panel top-bar">
        <div class="header-info">
            <h2>TSP Simulated Annealing Engine</h2>
            <p class="status" role="status" aria-live="polite">Status: Awaiting Nodes | Best Distance: 0.00</p>
        </div>
        <div class="controls">
            <button id="btn-random" class="btn outline">Generate 20 Cities</button>
            <button id="btn-run" class="btn primary">Start AI Heuristic</button>
            <button id="btn-clear" class="btn danger">Clear Plane</button>
        </div>
    </div>

    <div class="telemetry-panel">
        <div class="metric">
            <span class="label">Temperature</span>
            <span id="metric-temp" class="value">0.00</span>
        </div>
        <div class="metric">
            <span class="label">Current Distance</span>
            <span id="metric-dist" class="value">0.00</span>
        </div>
    </div>

    <div class="canvas-container">
        <p class="instruction-overlay">Click anywhere on the plane to drop a city.</p>
        <canvas id="viz-canvas" role="img" aria-label="2D Euclidean plane for TSP visualization"></canvas>
    </div>
</body>
</html>
