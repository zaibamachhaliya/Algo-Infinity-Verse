<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fortune's Sweepline Engine | Algo Infinity Verse</title>
    <link rel="stylesheet" href="fortunes-sweepline.css">
    <script src="fortunes-sweepline.js" defer></script>
</head>
<body>
    <div class="glass-panel top-bar">
        <div class="header-info">
            <h1>Computational Geometry: Fortune's Algorithm</h1>
            <p class="status" role="status" aria-live="polite">Status: Awaiting Sites | Voronoi Cells: 0</p>
        </div>
        <div class="controls">
            <button type="button" id="btn-random" class="btn outline">Generate Sites</button>
            <button type="button" id="btn-run" class="btn primary">Start Sweepline</button>
            <button type="button" id="btn-clear" class="btn danger">Clear Canvas</button>
        </div>
    </div>

    <div class="telemetry-panel">
        <div class="metric">
            <span class="label">Sweepline (Y)</span>
            <span id="metric-y" class="value">0.00</span>
        </div>
        <div class="metric">
            <span class="label">Active Parabolas</span>
            <span id="metric-parabolas" class="value">0</span>
        </div>
    </div>

    <div class="canvas-wrapper">
        <p class="instruction-overlay">Click anywhere to place a Voronoi site (seed).</p>
        <canvas id="bg-canvas" class="layer" role="presentation"></canvas>
        <canvas id="fg-canvas" class="layer" role="img" aria-label="Fortune's Algorithm visualization plane"></canvas>
    </div>
</body>
</html>
