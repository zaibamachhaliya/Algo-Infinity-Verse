<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binomial Heap Visualizer | Algo Infinity Verse</title>
    <link rel="stylesheet" href="binomial-heap.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js" defer crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="binomial-heap.js" defer></script>
</head>
<body>
    <div class="glass-panel top-bar">
        <div class="header-info">
            <h2>Binomial Heap Engine</h2>
            <p class="status" role="status" aria-live="polite">Status: Awaiting Input | Complexity: O(log N)</p>
        </div>
        <div class="controls">
            <label for="node-value" class="sr-only">Node value (comma separated)</label>
            <input type="text" id="node-value" placeholder="e.g. 10, 20, 30" autocomplete="off" />
            <button id="btn-insert" class="btn primary">Insert Node</button>
            <button id="btn-extract" class="btn danger">Extract Min</button>
            <button id="btn-clear" class="btn outline">Clear Canvas</button>
        </div>
    </div>

    <div class="canvas-container">
        <svg id="viz-canvas" role="img" aria-label="Binomial heap forest visualization"></svg>
    </div>
</body>
</html>
