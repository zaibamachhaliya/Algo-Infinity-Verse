<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B+ Tree Database Engine | Algo Infinity Verse</title>
    <link rel="stylesheet" href="bplus-tree.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js" defer crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="bplus-tree.js" defer></script>
</head>
<body>
    <div class="glass-panel top-bar">
        <div class="header-info">
            <h2>B+ Tree Indexing Simulator</h2>
            <p class="status" role="status" aria-live="polite">Status: Awaiting Input | Engine Order (m): 4</p>
        </div>
        <div class="controls">
            <label for="node-value" class="sr-only">Node value (comma separated keys)</label>
            <input type="text" id="node-value" placeholder="e.g. 10, 20, 30" autocomplete="off" />
            <button id="btn-insert" class="btn primary">Insert Key</button>
            <button id="btn-clear" class="btn outline">Drop Index</button>
        </div>
    </div>

    <div class="canvas-container">
        <svg id="viz-canvas" role="img" aria-label="B+ Tree database index visualization">
            <defs>
                <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                    <path d="M 0 0 L 10 5 L 0 10 z" fill="#10b981" />
                </marker>
            </defs>
        </svg>
    </div>
</body>
</html>
