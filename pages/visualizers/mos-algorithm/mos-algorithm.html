<!DOCTYPE html>
<html lang  = "en">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mo's Algorithm</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</html>
<body>
    <div class="container">
        <h1><i class="fas fa-layer-group"></i> Mo's Algorithm Visualizer</h1>

        <!-- Controls -->
        <div class="controls">
            <button type="button" onclick="generateArray()" class="btn btn-primary">
                <i class="fas fa-random"></i> Generate Array
            </button>
            <button type="button" onclick="generateQueries()" class="btn btn-secondary">
                <i class="fas fa-list"></i> Generate Queries
            </button>
            <button type="button" onclick="runAlgorithm()" class="btn btn-success">
                <i class="fas fa-play"></i> Run Mo's Algorithm
            </button>
            <button type="button" onclick="stepForward()" class="btn btn-warning">
                <i class="fas fa-step-forward"></i> Step
            </button>
            <button type="button" onclick="resetAll()" class="btn btn-danger">
                <i class="fas fa-undo"></i> Reset
            </button>
            <button type="button" onclick="toggleAutoPlay()" class="btn btn-primary" id="autoPlayBtn">
                <i class="fas fa-play"></i> Auto Play
            </button>
        </div>

        <!-- Speed Control -->
        <div class="speed-control">
            <label>Speed:</label>
            <input type="range" id="speedRange" min="200" max="2000" value="800" />
            <span id="speedLabel">800ms</span>
        </div>

        <!-- Array Display -->
        <div class="array-container" id="arrayContainer">
            <div class="array-header">
                <span class="array-title">📊 Array</span>
                <span class="array-size" id="arraySize">Size: 0</span>
            </div>
            <div class="array-visual" id="arrayVisual"></div>
        </div>

        <!-- Query Display -->
        <div class="query-container" id="queryContainer">
            <div class="query-header">
                <span class="query-title">📋 Queries</span>
                <span class="query-info" id="queryInfo">0 queries</span>
            </div>
            <div class="query-list" id="queryList"></div>
        </div>

        <!-- Current Query Visualization -->
        <div class="current-query" id="currentQuery">
            <div class="query-detail">
                <span id="queryRange">Range: [0, 0]</span>
                <span id="queryResult">Result: 0</span>
            </div>
        </div>

        <!-- Frequency Table -->
        <div class="frequency-container" id="frequencyContainer">
            <div class="frequency-header">
                <span class="frequency-title">📊 Frequency Table</span>
            </div>
            <div class="frequency-visual" id="frequencyVisual"></div>
        </div>

        <!-- Complexity Counter -->
        <div class="complexity-container">
            <div class="complexity-item">
                <span class="complexity-label">Operations:</span>
                <span class="complexity-value" id="operationsCount">0</span>
            </div>
            <div class="complexity-item">
                <span class="complexity-label">Time Complexity:</span>
                <span class="complexity-value" id="timeComplexity">O((N+Q)√N)</span>
            </div>
            <div class="complexity-item">
                <span class="complexity-label">Block Size:</span>
                <span class="complexity-value" id="blockSize">0</span>
            </div>
        </div>

        <!-- Message -->
        <div id="message" class="message"></div>
    </div>

    <script src="mos-algorithm.js"></script>
</body>
</html>
