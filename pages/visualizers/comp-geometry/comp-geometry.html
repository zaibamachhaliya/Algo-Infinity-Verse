<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algo Infinity Verse | Computational Geometry</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Orbitron:wght@500;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <link rel="stylesheet" href="comp-geometry.css">
</head>
<body>
    <div class="cyber-layout">
        <header class="hud-header">
            <div class="brand">
                <i class="fas fa-shapes neon-violet"></i>
                <h1>COMPUTATIONAL GEOMETRY PLAYGROUND<span>// SPATIAL ANALYSIS ENGINE</span></h1>
            </div>
            <div class="telemetry-badges">
                <span class="badge time"><i class="fas fa-satellite-dish"></i> Plane: Active</span>
                <span class="badge space"><i class="fas fa-draw-polygon"></i> SVG Renderer</span>
            </div>
        </header>

        <main class="workspace">
            <aside class="control-panel glass-panel">
                <h2 class="panel-title"><i class="fas fa-pen-nib"></i> DRAWING_TOOLS</h2>
                <div class="editor-tools">
                    <button type="button" id="tool-point" class="tool-btn active"><i class="fas fa-dot-circle"></i> Point</button>
                    <button type="button" id="tool-segment" class="tool-btn"><i class="fas fa-slash"></i> Segment</button>
                    <button type="button" id="tool-polygon" class="tool-btn"><i class="fas fa-draw-polygon"></i> Polygon</button>
                </div>
                <p class="helper-text"><i class="fas fa-info-circle"></i> Right-click canvas to finish Polygon.</p>

                <div class="divider"></div>

                <h2 class="panel-title"><i class="fas fa-calculator"></i> ALGORITHMS</h2>
                
                <div class="algo-grid">
                    <button type="button" id="btn-hull" class="cyber-btn primary">Convex Hull</button>
                    <button type="button" id="btn-closest" class="cyber-btn primary">Closest Pair</button>
                    <button type="button" id="btn-intersect" class="cyber-btn accent">Intersections</button>
                    <button type="button" id="btn-area" class="cyber-btn accent">Polygon Area</button>
                    <button type="button" id="btn-pip" class="cyber-btn violet">Point in Poly</button>
                    <button type="button" id="btn-clip" class="cyber-btn violet">Clip Polygons</button>
                </div>
                
                <button type="button" id="btn-clear" class="cyber-btn danger mt-1"><i class="fas fa-trash"></i> Wipe Canvas</button>

                <div class="divider"></div>

                <h2 class="panel-title"><i class="fas fa-terminal"></i> TELEMETRY_LOG</h2>
                <div id="execution-log" class="terminal-log">
                    <div class="log-entry system">[SYSTEM] Geometry Engine Initialized.</div>
                </div>
            </aside>

            <section class="visualization-stage glass-panel" id="stage-container">
                <svg id="geo-canvas" width="100%" height="100%"></svg>
            </section>
        </main>
    </div>
    <script src="comp-geometry.js"></script>
</body>
</html>
