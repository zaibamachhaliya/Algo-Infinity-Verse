<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Build Google From Scratch: Course Platform | Algo Infinity Verse</title>
    <meta name="description" content="Coursera-style masterclass on Google's Architecture." />
    <link rel="stylesheet" href="/styles.css" />
    <link rel="stylesheet" href="build-google-from-scratch.css" />
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@300;400;500;600;700&family=Fira+Code:wght@400;500;600&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <script src="https://d3js.org/d3.v7.min.js"></script>
</head>

<body data-page="build-google-from-scratch">
    <div id="loading-screen">
        <div class="loader">
            <div class="infinity-loader">∞</div>
            <h2>Algo Infinity Verse</h2>
            <div class="loading-bar">
                <div class="loading-progress"></div>
            </div>
        </div>
    </div>

    <div id="navbar-placeholder"></div>

    <div class="course-platform-container">
        
        <!-- Sidebar Syllabus -->
        <aside class="course-sidebar">
            <div class="sidebar-header">
                <h3>Course Syllabus</h3>
            </div>
            
            <!-- Controls for testing -->
            <button id="dev-unlock-btn" class="btn btn-sm btn-secondary" style="margin: 10px; font-size:0.7rem;">[Dev] Unlock All</button>

            <div class="accordion" id="syllabus-accordion">
                <!-- Dynamically populated by JS -->
            </div>
        </aside>

        <!-- Main Viewing Area -->
        <main class="course-viewer">
            
            <div class="viewer-header">
                <h2 id="viewer-title">Welcome to the Masterclass</h2>
            </div>
            
            <div class="viewer-content" id="viewer-content-area">
                <div class="welcome-screen">
                    <h1>Build Google From Scratch</h1>
                    <p>Welcome to the advanced masterclass. You will be building the architecture that powers billions of users. To proceed, navigate to the first lesson in the syllabus.</p>
                    <button class="btn btn-primary" id="start-course-btn">Start Module 1</button>
                </div>
            </div>

            <!-- Quiz Container (Hidden by default) -->
            <div class="viewer-quiz" id="viewer-quiz-area" style="display:none;">
                <!-- Quiz dynamically injected here -->
            </div>

            <!-- Bottom Navigation Bar -->
            <div class="viewer-footer">
                <button class="btn btn-secondary" id="btn-prev" disabled><i class="fas fa-chevron-left" aria-hidden="true"></i> Previous</button>
                <div id="completion-status" class="completion-status"></div>
                <button class="btn btn-primary" id="btn-next" style="display:none;">Next <i class="fas fa-chevron-right" aria-hidden="true"></i></button>
                <button class="btn btn-success" id="btn-complete" style="display:none;">Mark Completed <i class="fas fa-check" aria-hidden="true"></i></button>
                <button class="btn btn-primary" id="btn-submit-quiz" style="display:none;">Submit Quiz <i class="fas fa-paper-plane" aria-hidden="true"></i></button>
            </div>

        </main>
    </div>

    <!-- Data & Logic Scripts -->
    <script src="course-data.js"></script>
    <script src="google-labs.js"></script>
    <script src="build-google-from-scratch.js"></script>
    <script src="/scripts/global.js"></script>
</body>
</html>
