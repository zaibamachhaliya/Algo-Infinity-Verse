<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Data Structure Selection Assistant | Algo Infinity Verse</title>
    <meta name="description" content="Answer 3 quick questions and get a personalized data structure recommendation — Array, Linked List, HashMap, Heap, Trie, or BST." />
    <link rel="stylesheet" href="/styles.css" />
    <link rel="stylesheet" href="ds-selection-assistant.css" />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@300;400;500;600;700&family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  
    <!-- Theme Initialization Script -->
    <script>
      (function() {
        try {
          var storedTheme = localStorage.getItem('theme');
          var prefersLight = window.matchMedia('(prefers-color-scheme: light)').matches;
          var theme = storedTheme || (prefersLight ? 'light' : 'dark');
          if (theme === 'light') {
            document.documentElement.classList.add('light-mode');
          } else {
            document.documentElement.classList.remove('light-mode');
          }
        } catch (e) {}
      })();
    </script>
</head>
  <body data-page="ds-selection-assistant">
    <!-- Loading Screen -->
    <div id="loading-screen">
      <div class="loader">
        <div class="infinity-loader">∞</div>
        <h2>Algo Infinity Verse</h2>
        <div class="loading-bar"><div class="loading-progress"></div></div>
      </div>
    </div>

    <!-- Scroll to Top -->
    <button type="button" id="scrollTopBtn" class="scroll-top-btn" aria-label="Scroll to top">
      <i class="fas fa-circle-chevron-up"></i>
    </button>

    <!-- Navigation Bar -->
    <div id="navbar-placeholder"></div>

    <!-- Hero Section -->
    <section class="hero dsa-hero">
      <div class="hero-background">
        <div class="stars"></div><div class="stars2"></div><div class="stars3"></div>
      </div>
      <div class="hero-content">
        <h1 class="hero-title">
          <span class="title-line">Not Sure Which Data Structure to Use?</span>
          <span class="main-title dsa-gradient">Data Structure Selection Assistant</span>
          <span class="subtitle">Answer 3 quick questions and get a personalized recommendation with complexity analysis.</span>
        </h1>
        <div class="hero-buttons">
          <a href="#assistant" class="btn btn-primary"><i class="fas fa-wand-magic-sparkles"></i> Start Assistant</a>
          <a href="/pages/resources/cheat-sheets/cheat-sheets.html" class="btn btn-secondary"><i class="fas fa-file-lines"></i> DSA Cheat Sheets</a>
        </div>
      </div>
    </section>

    <!-- Assistant Section -->
    <section id="assistant" class="section">
      <div class="container">

        <!-- Wizard Card -->
        <div class="dsa-wizard-card" id="dsaWizardCard">
          <div class="dsa-progress">
            <!-- Rendered by JS -->
          </div>
          <div class="dsa-question-panel">
            <!-- Rendered by JS -->
          </div>
        </div>

        <!-- Result Section (hidden initially) -->
        <div class="dsa-result-section" id="dsaResultSection">

          <!-- Primary Recommendation -->
          <div class="dsa-recommendation-card">
            <!-- Rendered by JS -->
          </div>

          <!-- Comparison Grid -->
          <div class="dsa-comparison-title">
            <i class="fas fa-scale-balanced"></i> How All Data Structures Compare
          </div>
          <div class="dsa-comparison-grid">
            <!-- Rendered by JS -->
          </div>

          <!-- Restart -->
          <div class="dsa-restart-wrapper">
            <button type="button" class="dsa-restart-btn" id="dsaRestartBtn">
              <i class="fas fa-rotate-left"></i> Start Over
            </button>
          </div>
        </div>

      </div>
    </section>

    <!-- Footer -->
    <div id="footer-placeholder"></div>

    <script src="/auth.js"></script>
    <script src="/script.js"></script>
    <script src="/theme.js"></script>
    <script src="./ds-selection-assistant.js"></script>
  
  <script>
    loadPartial('navbar-placeholder', '/partials/navbar.html');
    loadPartial('footer-placeholder', '/partials/footer.html');
  </script>
</body>
</html>
