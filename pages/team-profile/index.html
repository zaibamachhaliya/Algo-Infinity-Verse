<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shared Team Profile - Algo-Infinity-Verse</title>
    
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="style.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body data-page="team-profile">

    <div id="navbar-placeholder"></div>

    <main class="team-profile-container container section">
        
        <header class="profile-header glass-card">
            <div class="profile-avatar-large">
                <span class="avatar-icon">👥</span>
            </div>
            <div class="profile-user-info">
                <h1 id="headerTeamName">Loading...</h1>
                <p class="profile-level" id="headerVersion">Version: 1</p>
            </div>
        </header>

        <section class="edit-section glass-card">
            <div class="section-header">
                <h2><i class="fas fa-edit"></i> Edit Team Profile</h2>
            </div>
            
            <div id="conflictAlert" class="alert hidden alert-danger">
                <strong><i class="fas fa-exclamation-triangle"></i> Conflict detected!</strong>
                <p>The profile was modified by another user. Please refresh to see the latest changes before saving.</p>
                <button type="button" id="refreshBtn" class="btn btn-primary btn-sm">Refresh Now</button>
            </div>

            <div id="successAlert" class="alert hidden alert-success">
                <strong><i class="fas fa-check-circle"></i> Success!</strong>
                <p>Profile updated successfully.</p>
            </div>

            <form id="teamProfileForm" class="profile-form">
                <div class="form-group">
                    <label for="teamName">Team Name</label>
                    <input type="text" id="teamName" class="form-control" required>
                </div>
                
                <div class="form-group">
                    <label for="teamDescription">Description</label>
                    <textarea id="teamDescription" class="form-control" rows="4"></textarea>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary" id="saveBtn">
                        <i class="fas fa-save"></i> Save Changes
                    </button>
                    <span id="saveStatus" class="save-status"></span>
                </div>
            </form>
        </section>

    </main>

    <div id="footer-placeholder"></div>

    <script src="../../theme.js"></script>
    <script src="../../script.js"></script>
    <script>
      if(typeof loadPartial === 'function') {
          loadPartial("navbar-placeholder", "../../partials/navbar.html").then(() => {
              if (typeof initNavbar === "function") initNavbar();
          });
          loadPartial("footer-placeholder", "../../partials/footer.html");
      }
    </script>
    <script src="team-profile.js"></script>
</body>
</html>
