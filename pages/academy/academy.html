<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Technology Academies — Algo Infinity Verse</title>
    <meta
      name="description"
      content="Explore 18+ technology academies and learning hubs covering frontend, backend, cloud, databases, and more. Master your craft with curated learning paths."
    />

    <link rel="stylesheet" href="/styles.css" />
    <link rel="stylesheet" href="academy.css" />

    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <script>
      (function () {
        try {
          var t = localStorage.getItem('theme');
          var p = window.matchMedia('(prefers-color-scheme: light)').matches;
          var theme = t || (p ? 'light' : 'dark');
          if (theme === 'light') document.documentElement.classList.add('light-mode');
        } catch (e) {}
      })();
    </script>
  </head>
  <body data-page="academy" data-no-loading>
    <main>
      <!-- HERO -->
      <section class="ac-hero">
        <div class="ac-hero-bg" aria-hidden="true"></div>
        <button
          type="button"
          class="ac-back-btn"
          id="acBackBtn"
          aria-label="Go back to previous page"
        >
          <i class="fas fa-arrow-left"></i>
          <span>Back</span>
        </button>
        <div class="ac-hero-content">
          <h1 class="ac-hero-title">
            <div class="ac-flip-wrap" id="acFlipWrap">
              <div class="ac-flip-inner" id="acFlipInner"></div>
            </div>
            <div class="ac-title-static">Academy</div>
          </h1>
          <p class="ac-hero-subtitle">
            Dive into structured learning hubs for modern tech stacks — from frontend frameworks to
            cloud infrastructure, databases, and beyond.
          </p>

          <!-- SEARCH -->
          <div class="ac-search-wrapper">
            <div class="ac-search">
              <i class="fas fa-search ac-search-icon"></i>
              <input
                type="text"
                id="acSearchInput"
                class="ac-search-input"
                placeholder="Search academies..."
                aria-label="Search academies"
                autocomplete="off"
              />
              <button type="button" id="acClearBtn" class="ac-clear-btn" aria-label="Clear search">
                <i class="fas fa-times"></i>
              </button>
              <span class="ac-search-hint">⌘K</span>
            </div>
          </div>

          <!-- FILTER CHIPS -->
          <div
            class="ac-filters"
            id="acFilters"
            role="tablist"
            aria-label="Academy categories"
          ></div>

          <p class="ac-result-count" id="acResultCount">
            Showing <span id="acCountDisplay">0</span> academies
          </p>
        </div>
      </section>

      <!-- CARD GRID -->
      <section class="ac-section">
        <div class="ac-container">
          <div class="ac-grid" id="acGrid" role="list">
            <!-- Cards rendered by JS -->
          </div>
          <div class="ac-empty" id="acEmpty" style="display: none">
            <i class="fas fa-search-minus"></i>
            <h3>No academies found</h3>
            <p>Try adjusting your search or filter.</p>
          </div>
        </div>
      </section>
    </main>

    <script src="/auth.js"></script>
    <script src="/theme.js"></script>
    <script src="/script.js"></script>
    <script src="academy.js"></script>
  </body>
</html>
