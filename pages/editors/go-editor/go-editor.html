<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Go Editor – Live Code Editor | Algo Infinity Verse</title>

<link rel="stylesheet" href="/styles.css">
<link rel="stylesheet" href="go-editor.css">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@300;400;500;600;700&family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Theme Initialization Script -->
    <script>
      (function() {
        try {
          var storedTheme = localStorage.getItem('theme');
          var prefersLight = window.matchMedia('(prefers-color-scheme: light)').matches;
          var theme = storedTheme || (prefersLight ? 'light' : 'dark');
          if (theme === 'light') {
            document.documentElement.classList.add('light-mode');
          } else {
            document.documentElement.classList.remove('light-mode');
          }
        } catch (e) {}
      })();
    </script>
</head>

<body data-page="go-editor">

<section class="hero go-hero">
  <div class="hero-content">
    <h1>
      <span>Write Go.</span>
      <span class="go-title">Run It Instantly.</span>
    </h1>

    <p class="go-desc">Learn Golang with a live simulated editor.</p>

    <a href="#editor" class="btn btn-primary">Open Editor</a>
  </div>
</section>

<section id="editor" class="section go-section">

<div class="go-container">

<div class="go-toolbar">

<select id="goExampleSelect" class="go-select">
  <option value="hello">Hello World</option>
  <option value="vars">Variables</option>
  <option value="slice">Slices</option>
  <option value="function">Functions</option>
</select>

<button type="button" id="goRunBtn" class="go-run-btn"><i class="fas fa-play"></i> Run</button>
<button type="button" id="goResetBtn" class="go-icon-btn"><i class="fas fa-undo"></i></button>
<button type="button" id="goCopyBtn" class="go-icon-btn"><i class="fas fa-copy"></i></button>

</div>

<div class="go-split">

<div class="go-editor-pane">
<textarea id="goEditor" class="go-editor"></textarea>
</div>

<div class="go-output-pane">
<div id="goOutput" class="go-output-body"></div>
</div>

</div>

</div>

</section>

<script src="go-editor.js"></script>

  <script>
    loadPartial('navbar-placeholder', '/partials/navbar.html');
    loadPartial('footer-placeholder', '/partials/footer.html');
  </script>
<script src="/auth.js"></script>
  <script src="/script.js"></script>
  <script src="/theme.js"></script>
  </body>
</html>
