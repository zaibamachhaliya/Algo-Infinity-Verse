<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pseudo-code Editor & Linter | Algo Infinity Verse</title>
  <meta name="description" content="Write, highlight, and lint custom pseudo-code in real-time." />
  <link rel="stylesheet" href="/styles.css" />
  <link rel="stylesheet" href="pseudo-code-editor.css" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@300;400;500;600;700&family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  
  <script>
    (function() {
      try {
        var storedTheme = localStorage.getItem('theme');
        var prefersLight = window.matchMedia('(prefers-color-scheme: light)').matches;
        var theme = storedTheme || (prefersLight ? 'light' : 'dark');
        if (theme === 'light') {
          document.documentElement.classList.add('light-mode');
        } else {
          document.documentElement.classList.remove('light-mode');
        }
      } catch (e) {}
    })();
  </script>
</head>
<body data-page="pseudo-code-editor">
  <!-- Loading Screen -->
  <div id="loading-screen">
    <div class="loader">
      <div class="infinity-loader">∞</div>
      <h2>Algo Infinity Verse</h2>
      <div class="loading-bar">
        <div class="loading-progress"></div>
      </div>
    </div>
  </div>

  <div id="navbar-placeholder"></div>

  <!-- Hero Section -->
  <section id="home" class="hero visualizer-hero">
    <div class="hero-background">
      <div class="stars"></div>
      <div class="stars2"></div>
      <div class="stars3"></div>
    </div>
    <div class="hero-content">
      <h1 class="hero-title">
        <span class="title-line">Real-time</span>
        <span class="main-title gradient-text">Pseudo-code Editor</span>
        <span class="subtitle">Design algorithms with instant syntax highlighting and linting.</span>
      </h1>
    </div>
  </section>

  <!-- Editor Section -->
  <section class="section" id="editor-section">
    <div class="container">
      <div class="editor-workspace glass-card">
        <!-- Toolbar -->
        <div class="editor-toolbar">
          <div class="toolbar-left">
            <button type="button" class="btn btn-secondary" id="btnFormat"><i class="fas fa-align-left"></i> Auto-Indent</button>
            <button type="button" class="btn btn-secondary" id="btnClear"><i class="fas fa-eraser"></i> Clear</button>
          </div>
          <div class="toolbar-right">
            <span id="lintStatus" class="status-badge valid"><i class="fas fa-check-circle"></i> Valid</span>
          </div>
        </div>
        
        <!-- Editor Area -->
        <div class="pseudo-editor-container">
          <div class="pseudo-line-numbers" id="pseudoLineNumbers" aria-hidden="true">1</div>
          <div class="pseudo-editor-scroll-area">
            <pre id="pseudoHighlightLayer" class="highlight-layer" aria-hidden="true"></pre>
            <textarea id="pseudoCodeEditor" class="pseudo-code-editor" spellcheck="false" aria-label="Pseudo-code editor" aria-describedby="lintStatus lintLog" placeholder="Write your pseudo-code here...
Example:
IF condition THEN
  PRINT 'Hello'
ENDIF"></textarea>
          </div>
        </div>

        <!-- Linter Log Panel -->
        <div class="lint-panel">
          <h3><i class="fas fa-bug"></i> Linting Issues</h3>
          <ul id="lintLog" class="lint-log">
            <li class="lint-empty">No syntax errors found. Excellent!</li>
          </ul>
        </div>
      </div>
    </div>
  </section>

  <div id="footer-placeholder"></div>

  <script src="/auth.js"></script>
  <script src="/script.js"></script>
  <script src="/theme.js"></script>
  <script src="pseudo-code-editor.js"></script>
  <script>
    loadPartial('navbar-placeholder', '/partials/navbar.html');
    loadPartial('footer-placeholder', '/partials/footer.html');
  </script>
</body>
</html>
