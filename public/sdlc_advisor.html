<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SDLC Advisor</title>
  <link rel="stylesheet" href="/styles.css" />
  <style>
    body {font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center;}
    .container {background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border-radius: 12px; padding: 2rem; max-width: 600px; width: 100%; box-shadow: 0 8px 32px 0 rgba(31,38,135,0.37);}
    textarea {width: 100%; height: 120px; border: none; border-radius: 8px; padding: 0.5rem; resize: vertical; font-size: 1rem;}
    button {margin-top: 1rem; padding: 0.75rem 1.5rem; background: #ff6b6b; border: none; border-radius: 8px; color: #fff; font-size: 1rem; cursor: pointer; transition: background 0.3s;}
    button:hover {background: #ff5252;}
    .result {margin-top: 1.5rem; background: rgba(255,255,255,0.15); padding: 1rem; border-radius: 8px;}
    .result h3 {margin-top: 0;}
    .recent {margin-top: 1rem; font-size: 0.9rem; opacity: 0.8;}
  </style>
</head>
<body>
  <div class="container">
    <h2>AI‑Powered SDLC Advisor</h2>
    <p>Describe your software project in natural language, and get a quick SDLC recommendation.</p>
    <textarea id="projectDesc" placeholder="e.g., Food Delivery App – users order meals, drivers deliver, real‑time tracking..."></textarea>
    <button type="button" id="generateBtn">Generate Advice</button>
    <div id="loading" style="display:none; margin-top:1rem;">Generating advice…</div>
    <div class="result" id="result" style="display:none;"></div>
    <div class="recent" id="recent"></div>
  </div>
  <script src="./sdlc_advisor.js"></script>
</body>
</html>
