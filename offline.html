<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline | Algo Infinity Verse</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background-color: #0a0f1d;
            color: #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            overflow: hidden;
        }
        .offline-container {
            padding: 2rem;
            max-width: 500px;
            background: rgba(16, 23, 42, 0.6);
            border: 1px solid rgba(148, 163, 184, 0.1);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
        }
        .icon {
            font-size: 5rem;
            color: #38bdf8;
            margin-bottom: 1rem;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }
        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            margin: 0 0 1rem 0;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p {
            font-size: 1rem;
            color: #94a3b8;
            margin-bottom: 2rem;
            line-height: 1.6;
        }
        .btn {
            display: inline-block;
            padding: 0.75rem 1.5rem;
            background: linear-gradient(to right, #0ea5e9, #6366f1);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(14, 165, 233, 0.4);
        }
        .features {
            text-align: left;
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        .feature-item {
            margin-bottom: 0.75rem;
            font-size: 0.9rem;
        }
        .feature-item i {
            color: #10b981;
            margin-right: 0.5rem;
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <i class="fas fa-wifi-slash icon"></i>
        <h1>You're Offline</h1>
        <p>It looks like you've lost your connection to the grid. Don't worry, your progress is safely stored in our local vault.</p>
        
        <button type="button" class="btn" onclick="window.location.reload()">
            <i class="fas fa-sync-alt"></i> Try Reconnecting
        </button>

        <div class="features">
            <h4 style="margin-top:0; color:#cbd5e1; font-family:'Orbitron', sans-serif;">While offline you can still:</h4>
            <div class="feature-item"><i class="fas fa-check-circle"></i> View previously loaded pages</div>
            <div class="feature-item"><i class="fas fa-check-circle"></i> Run pathfinding & sorting visualizers</div>
            <div class="feature-item"><i class="fas fa-check-circle"></i> View saved bookmarks & problems</div>
        </div>
    </div>
</body>
</html>
